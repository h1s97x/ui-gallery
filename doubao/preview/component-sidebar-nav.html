<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<title>Sidebar Nav · 豆包</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;padding:24px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);font-size:14px;line-height:1.4}
  .rail{width:248px;background:var(--sidebar);border:1px solid var(--sidebar-border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
  .search-wrap{padding:14px 14px 8px}
  .search{display:flex;align-items:center;gap:9px;height:38px;padding:0 12px;border-radius:10px;background:color-mix(in srgb,var(--background) 70%,var(--sidebar));border:1px solid transparent}
  .search input{flex:1;min-width:0;border:0;outline:0;background:transparent;color:inherit;font:13px var(--font-sans)}
  .search input::placeholder{color:var(--muted-foreground)}
  .kbd{padding:2px 6px;border-radius:6px;background:color-mix(in srgb,var(--muted-foreground) 14%,transparent);color:var(--muted-foreground);font:600 11px/1 var(--font-sans)}
  .nav{padding:4px 10px 8px;display:flex;flex-direction:column;gap:2px}
  .item{display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;border:0;border-radius:10px;background:transparent;color:var(--sidebar-foreground);font:14px var(--font-sans);text-align:left;cursor:pointer;transition:background .14s,color .14s}
  .item:hover{background:color-mix(in srgb,var(--background) 64%,var(--sidebar))}
  .item.active{background:var(--background);color:var(--foreground);font-weight:600}
  .item .lbl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item .icon{color:color-mix(in srgb,var(--foreground) 72%,var(--muted-foreground))}
  .item.active .icon{color:var(--primary)}
  .sc{color:var(--muted-foreground);font-size:12px}
  .section{padding:14px 12px 6px;font-size:12px;color:var(--muted-foreground)}
  .hist{display:flex;align-items:center;gap:10px;width:100%;padding:8px 11px;border:0;border-radius:10px;background:transparent;color:color-mix(in srgb,var(--foreground) 82%,var(--muted-foreground));font:13px var(--font-sans);text-align:left;cursor:pointer}
  .hist:hover{background:color-mix(in srgb,var(--background) 64%,var(--sidebar));color:var(--foreground)}
  .av{width:18px;height:18px;flex:none;border-radius:6px;display:grid;place-items:center;font-size:10px;color:#fff}
  .hist .lbl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .footer{margin-top:auto;border-top:1px solid var(--sidebar-border);padding:10px 12px;display:flex;align-items:center;gap:10px}
  .uav{width:30px;height:30px;flex:none;border-radius:50%;display:grid;place-items:center;font:600 13px/1 var(--font-sans);color:#fff;background:linear-gradient(135deg,var(--chart-1),var(--chart-4))}
  .uname{flex:1;min-width:0;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .icon{width:18px;height:18px;flex:none;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></symbol>
  <symbol id="bean" viewBox="0 0 24 24"><path d="M12 3c4 0 7 2.8 7 6.5 0 2-1 3.6-2.6 4.7.4 1 .6 2 .6 3.3 0 .8-.6 1.5-1.5 1.5-.8 0-1.4-.5-1.7-1.2-1.2.5-2.6.7-3.8.5"/><path d="M12 3C8 3 5 5.8 5 9.5 5 13 8 16 12 16"/></symbol>
  <symbol id="chat" viewBox="0 0 24 24"><path d="M21 12a8 8 0 0 1-11.6 7.1L4 20l1-5A8 8 0 1 1 21 12Z"/></symbol>
  <symbol id="task" viewBox="0 0 24 24"><path d="M9 5h9a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7"/><path d="M9 3h2a1 1 0 0 1 1 1v1a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z"/><path d="M8 12h6M8 16h4"/></symbol>
  <symbol id="create" viewBox="0 0 24 24"><path d="M12 3 4 7v10l8 4 8-4V7l-8-4Z"/><path d="M12 3v18M4 7l8 4 8-4"/></symbol>
  <symbol id="cloud" viewBox="0 0 24 24"><path d="M7 18a4 4 0 0 1-.5-7.97A6 6 0 0 1 18 9.5a3.5 3.5 0 0 1-.5 8.5H7Z"/></symbol>
  <symbol id="compass" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M14.5 9.5 13 13l-3.5 1.5L11 11l3.5-1.5Z"/></symbol>
  <symbol id="dots" viewBox="0 0 24 24"><path d="M5 12h.01M12 12h.01M19 12h.01"/></symbol>
</svg>

<div class="rail">
  <div class="search-wrap">
    <div class="search">
      <svg class="icon" style="width:18px;height:18px;color:var(--muted-foreground)"><use href="#i-search"/></svg>
      <input placeholder="搜索..." aria-label="搜索">
      <span class="kbd">⌘K</span>
    </div>
  </div>

  <nav class="nav">
    <button class="item"><svg class="icon"><use href="#bean"/></svg><span class="lbl">豆包</span></button>
    <button class="item active"><svg class="icon"><use href="#chat"/></svg><span class="lbl">新对话</span><span class="sc">⌘K</span></button>
    <button class="item"><svg class="icon"><use href="#task"/></svg><span class="lbl">新办公任务</span></button>
    <button class="item"><svg class="icon"><use href="#create"/></svg><span class="lbl">AI 创作</span></button>
    <button class="item"><svg class="icon"><use href="#cloud"/></svg><span class="lbl">云盘</span></button>
    <button class="item"><svg class="icon"><use href="#compass"/></svg><span class="lbl">发现智能体</span></button>

    <div class="section">历史对话</div>
    <button class="hist"><span class="av" style="background:#0065fd">鱼</span><span class="lbl">同一锅鱼评价</span></button>
    <button class="hist"><span class="av" style="background:#7c3aed">袁</span><span class="lbl">论袁的魅力</span></button>
    <button class="hist"><span class="av" style="background:#0065fd">EN</span><span class="lbl">英语学习助手</span></button>
    <button class="hist"><span class="av" style="background:#db2777">漫</span><span class="lbl">AI 漫画生成</span></button>
  </nav>

  <div class="footer">
    <span class="uav">豆</span>
    <span class="uname">用户8081875236843</span>
    <svg class="icon" style="color:var(--muted-foreground)"><use href="#dots"/></svg>
  </div>
</div>
</body>
</html>
