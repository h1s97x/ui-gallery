<!DOCTYPE html>
<html lang="zh-CN">
  <head>

    <meta charset="UTF-8" />

    <title>豆包 · Doubao UI Kit</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --shell-radius: 14px;
        --control-radius: 10px;
        --pill-radius: 999px;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--background);
        color: var(--foreground);
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      body {
        min-height: 100vh;
      }

      button,
      input,
      textarea {
        font: inherit;
        color: inherit;
      }

      button {
        appearance: none;
        cursor: pointer;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: color-mix(in srgb, var(--muted-foreground) 28%, transparent);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: color-mix(in srgb, var(--muted-foreground) 45%, transparent);
      }

      .app {
        height: 100vh;
        display: grid;
        grid-template-columns: 248px minmax(0, 1fr);
        background: var(--background);
        overflow: hidden;
      }

      /* ---------- Sidebar ---------- */
      .sidebar {
        display: flex;
        flex-direction: column;
        background: var(--sidebar);
        border-right: 1px solid var(--sidebar-border);
        min-height: 0;
      }

      .sidebar-search {
        padding: 14px 14px 8px;
      }

      .search-field {
        height: 38px;
        padding: 0 12px;
        border-radius: var(--control-radius);
        background: color-mix(in srgb, var(--background) 70%, var(--sidebar));
        border: 1px solid transparent;
        display: flex;
        align-items: center;
        gap: 9px;
        transition: border-color 160ms ease, background 160ms ease;
      }

      .search-field:focus-within {
        border-color: var(--ring);
        background: var(--background);
      }

      .search-field input {
        flex: 1;
        min-width: 0;
        border: 0;
        outline: none;
        background: transparent;
        font-size: 0.86rem;
      }

      .search-field input::placeholder {
        color: var(--muted-foreground);
      }

      .kbd {
        display: inline-flex;
        align-items: center;
        gap: 1px;
        padding: 2px 6px;
        border-radius: 6px;
        background: color-mix(in srgb, var(--muted-foreground) 14%, transparent);
        color: var(--muted-foreground);
        font-size: 0.7rem;
        font-weight: 600;
      }

      .icon {
        width: 18px;
        height: 18px;
        flex: none;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .icon-sm {
        width: 15px;
        height: 15px;
      }

      .nav-scroll {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 4px 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .nav-item {
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--sidebar-foreground);
        border-radius: var(--control-radius);
        padding: 9px 11px;
        display: flex;
        align-items: center;
        gap: 11px;
        text-align: left;
        font-size: 0.9rem;
        line-height: 1.2;
        transition: background 140ms ease, color 140ms ease;
      }

      .nav-item:hover {
        background: color-mix(in srgb, var(--background) 64%, var(--sidebar));
      }

      .nav-item.active {
        background: var(--background);
        color: var(--foreground);
        font-weight: 600;
      }

      .nav-item .nav-label {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .nav-item .icon {
        color: color-mix(in srgb, var(--foreground) 72%, var(--muted-foreground));
      }

      .nav-item.active .icon {
        color: var(--primary);
      }

      .nav-shortcut {
        color: var(--muted-foreground);
        font-size: 0.72rem;
        opacity: 0;
        transition: opacity 140ms ease;
      }

      .nav-item:hover .nav-shortcut {
        opacity: 1;
      }

      .nav-collapse {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 9px 11px;
        margin-top: 4px;
        color: var(--muted-foreground);
        font-size: 0.86rem;
        border-radius: var(--control-radius);
      }

      .nav-collapse:hover {
        background: color-mix(in srgb, var(--background) 64%, var(--sidebar));
      }

      .nav-collapse .chev {
        margin-left: auto;
        transition: transform 200ms ease;
      }

      .nav-section-label {
        padding: 14px 12px 6px;
        font-size: 0.74rem;
        color: var(--muted-foreground);
      }

      .history-item {
        width: 100%;
        border: 0;
        background: transparent;
        color: color-mix(in srgb, var(--foreground) 82%, var(--muted-foreground));
        border-radius: var(--control-radius);
        padding: 8px 11px;
        display: flex;
        align-items: center;
        gap: 10px;
        text-align: left;
        font-size: 0.86rem;
      }

      .history-item:hover {
        background: color-mix(in srgb, var(--background) 64%, var(--sidebar));
        color: var(--foreground);
      }

      .history-avatar {
        width: 18px;
        height: 18px;
        border-radius: 6px;
        flex: none;
        display: grid;
        place-items: center;
        font-size: 0.62rem;
        color: #fff;
      }

      .history-item .nav-label {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .sidebar-footer {
        border-top: 1px solid var(--sidebar-border);
        padding: 10px 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .user-avatar {
        width: 30px;
        height: 30px;
        border-radius: var(--pill-radius);
        background: linear-gradient(135deg, var(--chart-1), var(--chart-4));
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 0.78rem;
        font-weight: 600;
        flex: none;
      }

      .user-name {
        flex: 1;
        min-width: 0;
        font-size: 0.84rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .user-more {
        border: 0;
        background: transparent;
        color: var(--muted-foreground);
        display: grid;
        place-items: center;
        width: 26px;
        height: 26px;
        border-radius: 8px;
      }
      .user-more:hover {
        background: color-mix(in srgb, var(--background) 64%, var(--sidebar));
      }

      /* ---------- Main ---------- */
      .main {
        min-width: 0;
        display: flex;
        flex-direction: column;
        background: var(--background);
        min-height: 0;
      }

      .topbar {
        height: 52px;
        flex: none;
        padding: 0 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid transparent;
      }

      .icon-btn {
        width: 34px;
        height: 34px;
        border: 0;
        background: transparent;
        color: var(--muted-foreground);
        border-radius: 9px;
        display: grid;
        place-items: center;
        transition: background 140ms ease, color 140ms ease;
      }
      .icon-btn:hover {
        background: var(--muted);
        color: var(--foreground);
      }

      .topbar-center {
        flex: 1;
        text-align: center;
        min-width: 0;
      }
      .topbar-title {
        font-size: 0.92rem;
        font-weight: 600;
      }
      .topbar-sub {
        font-size: 0.72rem;
        color: var(--muted-foreground);
        margin-top: 1px;
      }

      .btn {
        height: 36px;
        padding: 0 15px;
        border-radius: var(--pill-radius);
        border: 1px solid transparent;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 0.86rem;
        font-weight: 500;
        transition: background 150ms ease, border-color 150ms ease, transform 120ms ease, color 150ms ease;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn:focus-visible {
        outline: 2px solid var(--ring);
        outline-offset: 2px;
      }
      .btn-primary {
        background: var(--primary);
        color: var(--primary-foreground);
      }
      .btn-primary:hover {
        background: color-mix(in srgb, var(--primary) 90%, #000);
      }
      .btn-ghost {
        background: var(--muted);
        color: var(--foreground);
      }
      .btn-ghost:hover {
        background: color-mix(in srgb, var(--muted) 80%, var(--foreground) 12%);
      }
      .btn-outline {
        background: var(--background);
        color: var(--foreground);
        border-color: var(--border);
      }
      .btn-outline:hover {
        background: var(--muted);
      }

      .scroll-area {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }

      /* ---------- Discover view ---------- */
      .discover {
        max-width: 920px;
        margin: 0 auto;
        padding: 12px 28px 48px;
      }

      .discover-head {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 18px;
      }
      .discover-head h1 {
        margin: 0;
        font-size: 1.5rem;
        flex: 1;
      }

      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 22px;
      }
      .tab {
        height: 34px;
        padding: 0 16px;
        border-radius: var(--pill-radius);
        border: 0;
        background: transparent;
        color: var(--muted-foreground);
        font-size: 0.88rem;
        transition: background 150ms ease, color 150ms ease;
      }
      .tab:hover {
        background: var(--muted);
        color: var(--foreground);
      }
      .tab.active {
        background: var(--foreground);
        color: var(--background);
        font-weight: 600;
      }

      .agent-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .agent-card {
        text-align: left;
        border: 1px solid var(--border);
        border-radius: var(--shell-radius);
        background: var(--card);
        padding: 16px;
        display: flex;
        gap: 13px;
        transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
      }
      .agent-card:hover {
        border-color: color-mix(in srgb, var(--primary) 40%, var(--border));
        background: color-mix(in srgb, var(--accent) 22%, var(--card));
        transform: translateY(-2px);
      }

      .agent-icon {
        width: 44px;
        height: 44px;
        border-radius: 13px;
        flex: none;
        display: grid;
        place-items: center;
        font-size: 1.25rem;
        color: #fff;
      }

      .agent-body {
        flex: 1;
        min-width: 0;
      }
      .agent-title {
        font-size: 0.96rem;
        font-weight: 600;
        margin: 2px 0 5px;
      }
      .agent-desc {
        font-size: 0.82rem;
        line-height: 1.5;
        color: var(--muted-foreground);
        margin: 0 0 12px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .agent-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.74rem;
        color: var(--muted-foreground);
      }
      .agent-meta .dot {
        width: 3px;
        height: 3px;
        border-radius: 999px;
        background: currentColor;
        opacity: 0.6;
      }
      .agent-meta .count {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      /* ---------- Chat view ---------- */
      .chat {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .chat-inner {
        width: 100%;
        max-width: 720px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .chat-greeting {
        font-size: 2rem;
        font-weight: 700;
        text-align: center;
        margin: 0 0 28px;
        letter-spacing: -0.01em;
      }

      .suggestions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        margin-bottom: 30px;
      }
      .suggestion {
        border: 0;
        background: var(--muted);
        color: color-mix(in srgb, var(--foreground) 80%, var(--muted-foreground));
        border-radius: var(--pill-radius);
        padding: 9px 15px;
        font-size: 0.84rem;
        transition: background 150ms ease, color 150ms ease;
      }
      .suggestion:hover {
        background: color-mix(in srgb, var(--accent) 60%, var(--muted));
        color: var(--accent-foreground);
      }

      /* ---------- Composer ---------- */
      .composer {
        width: 100%;
        max-width: 720px;
        border: 1px solid var(--border);
        border-radius: 22px;
        background: var(--card);
        padding: 14px 16px 10px;
        transition: border-color 160ms ease, box-shadow 160ms ease;
      }
      .composer:focus-within {
        border-color: var(--ring);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 18%, transparent);
      }
      .composer textarea {
        width: 100%;
        border: 0;
        outline: none;
        background: transparent;
        resize: none;
        font-size: 0.95rem;
        line-height: 1.5;
        min-height: 24px;
        max-height: 160px;
      }
      .composer textarea::placeholder {
        color: var(--muted-foreground);
      }

      .composer-tools {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
        flex-wrap: nowrap;
      }
      .tool-scroll {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 6px;
        overflow-x: auto;
        scroll-behavior: smooth;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .tool-scroll::-webkit-scrollbar {
        display: none;
      }
      .tool-chip {
        flex: 0 0 auto;
        border: 0;
        background: transparent;
        color: color-mix(in srgb, var(--foreground) 78%, var(--muted-foreground));
        border-radius: var(--pill-radius);
        padding: 7px 11px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.82rem;
        white-space: nowrap;
        transition: background 140ms ease, color 140ms ease;
      }
      .tool-chip:hover {
        background: var(--muted);
        color: var(--foreground);
      }
      .tool-chip.round {
        flex: none;
        width: 34px;
        height: 34px;
        padding: 0;
        justify-content: center;
        border: 1px solid var(--border);
      }
      .send-btn {
        flex: none;
        width: 36px;
        height: 36px;
        border-radius: var(--pill-radius);
        border: 0;
        background: var(--primary);
        color: var(--primary-foreground);
        display: grid;
        place-items: center;
        transition: background 150ms ease, transform 120ms ease, opacity 150ms ease;
      }
      .send-btn:hover {
        background: color-mix(in srgb, var(--primary) 90%, #000);
      }
      .send-btn:disabled {
        background: var(--muted);
        color: var(--muted-foreground);
        cursor: default;
      }
      .voice-btn {
        flex: none;
        width: 36px;
        height: 36px;
        border-radius: var(--pill-radius);
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted-foreground);
        display: grid;
        place-items: center;
      }
      .voice-btn:hover {
        background: var(--muted);
        color: var(--foreground);
      }

      @media (max-width: 880px) {
        .app {
          grid-template-columns: 1fr;
        }
        .sidebar {
          display: none;
        }
        .agent-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
