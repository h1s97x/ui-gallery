<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body { margin: 0; padding: 12px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }.row { display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap; }.label { width: 100%; font-size: 10px; line-height: 1; letter-spacing: .08em; text-transform: uppercase; color: var(--muted-foreground); }.sidebar { width: 220px; display: flex; flex-direction: column; gap: calc(var(--spacing) * 1.5); padding: calc(var(--spacing) * 1.5); background: var(--sidebar); color: var(--sidebar-foreground); border: 1px solid var(--sidebar-border); border-radius: calc(var(--radius) + 2px); box-shadow: var(--shadow-sm); }.workspace { font-size: 13px; font-weight: 600; }.section { display: flex; flex-direction: column; gap: 4px; }.item { display: flex; align-items: center; min-height: 34px; padding: 0 12px; border-radius: calc(var(--radius) - 2px); color: inherit; background: transparent; }.item.active { background: var(--sidebar-primary); color: var(--sidebar-primary-foreground); }.item:not(.active):hover { background: var(--sidebar-accent); color: var(--sidebar-accent-foreground); }.footer { padding-top: var(--spacing); border-top: 1px solid var(--sidebar-border); }.disabled,.is-disabled { opacity: .48; }.compact { width: 196px; gap: var(--spacing); padding: var(--spacing); }.compact .item { min-height: 30px; padding: 0 10px; }.divider { margin: 8px 0; border: 0; border-top: 1px solid var(--border); }</style>
</head>
<body>
<div class="row"><span class="label">Default</span><aside class="sidebar"><div class="workspace">Vercel</div><nav class="section"><div class="item active">Projects</div><div class="item">Analytics</div><div class="item">Storage</div><div class="item">Integrations</div></nav><div class="footer section"><div class="item">Billing</div><div class="item">Security</div></div></aside><aside class="sidebar is-disabled"><div class="workspace">Vercel</div><nav class="section"><div class="item active">Projects</div><div class="item">Analytics</div><div class="item">Storage</div><div class="item">Integrations</div></nav><div class="footer section"><div class="item disabled">Billing</div><div class="item disabled">Security</div></div></aside></div>
<hr class="divider">
<div class="row"><span class="label">Compact</span><aside class="sidebar compact"><div class="workspace">Vercel</div><nav class="section"><div class="item">Projects</div><div class="item active">Analytics</div><div class="item">Storage</div><div class="item">Integrations</div></nav><div class="footer section"><div class="item">Billing</div></div></aside><aside class="sidebar compact is-disabled"><div class="workspace">Vercel</div><nav class="section"><div class="item">Projects</div><div class="item active">Analytics</div><div class="item">Storage</div><div class="item">Integrations</div></nav><div class="footer section"><div class="item disabled">Billing</div></div></aside></div>
</body>
</html>
