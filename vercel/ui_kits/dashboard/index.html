<!doctype html>
<html lang="en" class="dark">
<head>
<link rel="stylesheet" href="../../colors_and_type.css">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vercel Dashboard UI Kit</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--background);color:var(--foreground);font-family:var(--font-sans);letter-spacing:var(--tracking-normal)}
button,input{font:inherit}
button{border:0;background:none;color:inherit}
svg.icon{flex:none;display:inline-block;vertical-align:middle;stroke:currentColor}
.icon-muted{color:var(--muted-foreground)}
.metric-icon,.header-icon{flex:none;display:grid;place-items:center;width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--background);color:var(--muted-foreground)}
.header-icon.is-danger{color:var(--destructive);border-color:var(--destructive)}
.cell-lead,.list-head,.pulse-name{display:inline-flex;align-items:center;gap:calc(var(--spacing)*2);white-space:nowrap;min-width:0;max-width:100%}
.cell-lead svg,.pulse-name svg{color:var(--muted-foreground)}
.note-icon{flex:none;display:inline-flex;align-items:center;justify-content:center;color:var(--muted-foreground)}
.note-icon.is-low{color:var(--success-strong)}
.note-icon.is-high{color:var(--destructive)}
body{padding:0}
.app-shell{display:grid;grid-template-columns:minmax(216px,var(--uikit-sidebar-w,240px)) minmax(0,1fr);min-height:100vh;height:100vh;align-items:stretch;background:var(--background);isolation:isolate}
.uikit-shell{width:100%;max-width:1184px;margin:0 auto;overflow:hidden}
.uikit-sidebar,.sidebar,.content,.uikit-main{min-width:0;min-height:0}
.sidebar,.uikit-sidebar{background:var(--sidebar);color:var(--sidebar-foreground);border-right:1px solid var(--sidebar-border);padding:calc(var(--spacing)*2);display:flex;flex-direction:column;gap:calc(var(--spacing)*2.5);font-size:13px;align-self:stretch;height:100%;overflow:auto;overscroll-behavior:contain}
.content,.uikit-main{background:var(--background);display:flex;flex-direction:column;height:100%;overflow:auto;overscroll-behavior:contain}
.uikit-toolbar{display:flex;align-items:center;justify-content:space-between;gap:calc(var(--spacing)*3);min-width:0}
.uikit-responsive-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:calc(var(--spacing)*3);align-items:stretch}
.uikit-table-wrap{min-width:0;max-width:100%;overflow-x:auto;overflow-y:hidden;overscroll-behavior-x:contain}
.uikit-truncate{display:inline-block;min-width:0;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:bottom}
.uikit-nowrap{white-space:nowrap;flex-shrink:0}
.uikit-action-cell{width:1%;white-space:nowrap;text-align:right;min-width:0;max-width:160px;overflow:hidden}
.uikit-action{display:inline-flex;align-items:center;justify-content:center;min-width:0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.workspace{display:flex;align-items:center;gap:calc(var(--spacing)*1.5);padding:calc(var(--spacing)*1.5) calc(var(--spacing)*2);border:1px solid var(--sidebar-border);border-radius:var(--radius);cursor:pointer;background:transparent}
.workspace:hover{background:var(--sidebar-accent);color:var(--sidebar-accent-foreground)}
.workspace .ws-avatar{width:18px;height:18px;border-radius:999px;background:var(--muted);flex:none}
.workspace .ws-name{font-weight:500;font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left}
.workspace svg{flex:none;color:var(--muted-foreground)}
.workspace .ws-collapse{margin-left:calc(var(--spacing)*1);padding-left:calc(var(--spacing)*1.5);border-left:1px solid var(--sidebar-border);display:inline-flex;align-items:center}
.cta{display:flex;align-items:center;justify-content:center;gap:calc(var(--spacing)*1.5);padding:calc(var(--spacing)*2) calc(var(--spacing)*2.5);border:1px solid var(--sidebar-border);border-radius:var(--radius);background:var(--sidebar-accent);color:var(--sidebar-accent-foreground);font-weight:500;cursor:pointer}
.cta:hover{background:var(--accent);color:var(--accent-foreground)}
.brand{display:none}
.nav-list{display:flex;flex-direction:column;gap:1px}
.nav-item,.quick-chip,.icon-btn,.btn,.pill-toggle,.table-action,.toggle-input,.workspace,.cta,.section-head{transition:background-color .15s ease,color .15s ease,border-color .15s ease}
.nav-item{width:100%;display:flex;align-items:center;gap:calc(var(--spacing)*2);padding:calc(var(--spacing)*2) calc(var(--spacing)*2.5);border:1px solid transparent;border-radius:var(--radius);cursor:pointer;text-align:left;font-size:13px;color:var(--sidebar-foreground)}
.nav-item svg{flex:none;color:var(--muted-foreground)}
.nav-item:hover{background:var(--sidebar-accent);color:var(--sidebar-accent-foreground)}
.nav-item:hover svg{color:var(--sidebar-accent-foreground)}
.nav-item.active{background:var(--sidebar-accent);color:var(--sidebar-accent-foreground)}
.nav-item.active svg{color:var(--sidebar-accent-foreground)}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--spacing)*1.5) calc(var(--spacing)*2.5);font:500 11px/1 var(--font-sans);letter-spacing:.02em;color:var(--muted-foreground);text-transform:none;cursor:pointer;background:transparent;border:0;width:100%;text-align:left;margin-top:calc(var(--spacing)*1)}
.section-head:hover{color:var(--sidebar-accent-foreground)}
.section-head svg{flex:none}
.recent-list{display:flex;flex-direction:column;gap:1px}
.recent-item{display:flex;align-items:center;gap:calc(var(--spacing)*2);padding:calc(var(--spacing)*1.5) calc(var(--spacing)*2.5);border-radius:var(--radius);font-size:12.5px;color:var(--sidebar-foreground);cursor:pointer;border:0;background:transparent;width:100%;text-align:left}
.recent-item:hover{background:var(--sidebar-accent);color:var(--sidebar-accent-foreground)}
.recent-item .recent-dot{flex:none;width:14px;height:14px;border-radius:999px;border:1px dashed var(--muted-foreground);opacity:.5}
.recent-item .recent-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.recent-item.is-more{color:var(--muted-foreground)}
.recent-item.is-more .recent-dot{border:0;background:transparent;opacity:1;display:inline-flex;align-items:center;justify-content:center}
.nav-meta{margin-top:auto;padding-top:calc(var(--spacing)*2);border-top:1px solid var(--sidebar-border);display:flex;align-items:center;gap:calc(var(--spacing)*2)}
.user-pill{display:flex;align-items:center;gap:calc(var(--spacing)*2);padding:calc(var(--spacing)*1.5);flex:1;border-radius:var(--radius);cursor:pointer}
.user-pill:hover{background:var(--sidebar-accent);color:var(--sidebar-accent-foreground)}
.user-pill .ws-avatar{width:22px;height:22px;border-radius:999px;background:var(--muted);flex:none}
.user-pill .user-handle{font-size:12.5px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.plan-badge{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:22px;padding:0 calc(var(--spacing)*1.5);border-radius:6px;background:var(--accent);color:var(--accent-foreground);font:600 11px/1 var(--font-mono);border:1px solid var(--sidebar-border)}
.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:calc(var(--spacing)*3);padding:calc(var(--spacing)*3) calc(var(--spacing)*4);border-bottom:1px solid var(--border);background:var(--background)}
.search{display:flex;align-items:center;gap:calc(var(--spacing)*2);flex:1 1 320px;max-width:360px;min-width:200px;height:34px;padding:0 calc(var(--spacing)*3);border:1px solid var(--input);border-radius:var(--radius);background:var(--card);color:var(--muted-foreground);font-size:13px}
.search input{width:100%;border:0;outline:none;background:transparent;color:var(--foreground);font-size:13px}
.toolbar{display:flex;align-items:center;gap:calc(var(--spacing)*2);flex:none;min-width:0;flex-wrap:nowrap}
.icon-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:var(--radius);display:grid;place-items:center;cursor:pointer;background:var(--card);color:var(--muted-foreground)}
.icon-btn:hover{background:var(--accent);color:var(--accent-foreground)}
.user-chip{display:flex;align-items:center;gap:calc(var(--spacing)*2);padding:calc(var(--spacing)*1) calc(var(--spacing)*2) calc(var(--spacing)*1) calc(var(--spacing)*1);border:1px solid var(--border);border-radius:999px;background:var(--card);white-space:nowrap;min-width:0;max-width:220px}
.avatar{width:24px;height:24px;border-radius:999px;background:var(--primary);color:var(--primary-foreground);display:grid;place-items:center;font:600 11px/1 var(--font-sans);flex:none}
.screen-shell{flex:1 0 auto;padding:calc(var(--spacing)*4);display:grid;gap:calc(var(--spacing)*4);align-content:start;min-width:0;animation:screenIn .28s ease}
.screen-shell>*,.hero>*,.overview-grid>*,.panel-grid>*,.settings-layout>*{min-width:0}
.hero{display:flex;align-items:flex-start;justify-content:space-between;gap:calc(var(--spacing)*4);flex-wrap:nowrap}
.hero>div:first-child{flex:1 1 420px;min-width:0;max-width:680px}
.eyebrow{font:500 10.5px/1 var(--font-mono);text-transform:uppercase;letter-spacing:.06em;color:var(--muted-foreground)}
.hero h1{margin:calc(var(--spacing)*2) 0 0;font:600 22px/1.15 var(--font-sans);letter-spacing:-.01em}
.hero p{margin:calc(var(--spacing)*1.5) 0 0;color:var(--muted-foreground);max-width:560px;font-size:13px}
.hero-actions,.view-switch,.card-actions,.inline-actions,.settings-actions{display:flex;align-items:center;gap:calc(var(--spacing)*2);flex-wrap:nowrap;min-width:0;max-width:100%}
.hero-actions,.card-actions,.inline-actions,.settings-actions{margin-left:auto;justify-content:flex-end}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:calc(var(--spacing)*2);height:34px;padding:0 calc(var(--spacing)*3);border:1px solid transparent;border-radius:var(--radius);cursor:pointer;font:500 13px/1 var(--font-sans);white-space:nowrap}
.btn-primary{background:var(--primary);color:var(--primary-foreground);box-shadow:var(--shadow-xs)}
.btn-primary:hover{background:var(--foreground)}
.btn-secondary{background:var(--secondary);color:var(--secondary-foreground);border-color:var(--border)}
.btn-secondary:hover{background:var(--accent);color:var(--accent-foreground)}
.btn-ghost{background:transparent;color:var(--foreground);border-color:var(--border)}
.btn-ghost:hover{background:var(--accent);color:var(--accent-foreground)}
.view-switch{padding:2px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);flex-wrap:nowrap;gap:0;max-width:100%;overflow:auto hidden;scrollbar-width:none}
.view-switch::-webkit-scrollbar{display:none}
.pill-toggle{height:26px;padding:0 calc(var(--spacing)*2.5);border-radius:calc(var(--radius) - 2px);cursor:pointer;color:var(--muted-foreground);font:500 12px/1 var(--font-sans)}
.pill-toggle.active{background:var(--primary);color:var(--primary-foreground)}
.metrics-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:calc(var(--spacing)*3);align-items:stretch;grid-auto-rows:1fr}
.panel-grid{display:grid;grid-template-columns:minmax(0,1.65fr) minmax(300px,.95fr);gap:calc(var(--spacing)*3);align-items:stretch}
.overview-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:calc(var(--spacing)*3);align-items:stretch;grid-auto-flow:row;grid-auto-rows:minmax(0,auto)}
.overview-main{grid-column:1 / span 2;min-width:0}
.overview-side{min-width:0}
.card,.overview-grid>.card,.metrics-grid>.card,.panel-grid>.card,.settings-layout>.card{display:flex;flex-direction:column;gap:calc(var(--spacing)*3);padding:calc(var(--spacing)*3.5);border:1px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--card-foreground);min-width:0;min-height:0;height:100%;overflow:hidden}
.card>*{min-width:0}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:calc(var(--spacing)*3);min-width:0;flex-wrap:wrap}
.card-header>div:first-child{flex:1 1 220px;min-width:0}
.card h2,.card h3,.card h4{margin:0}
.card h3{font:600 14px/1.3 var(--font-sans);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.metric-value{font:600 24px/1.1 var(--font-sans);letter-spacing:-.01em;white-space:nowrap}
.metric-foot,.subtle,.table-note,.settings-note,.list-line small,.field-note{color:var(--muted-foreground);font-size:12px}
.spark-track{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));align-items:end;gap:calc(var(--spacing)*1.5);height:76px;padding-top:calc(var(--spacing)*3)}
.spark-bar{border-radius:2px;background:var(--chart-2)}
.barH18{height:18%}
.barH24{height:24%}
.barH32{height:32%}
.barH40{height:40%}
.barH52{height:52%}
.barH60{height:60%}
.barH68{height:68%}
.barH82{height:82%}
.progress-track{height:6px;border-radius:3px;background:var(--accent);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--primary)}
.progress28{width:28%}
.progress52{width:52%}
.progress73{width:73%}
.progress88{width:88%}
.list-stack{display:grid;gap:0;min-width:0}
.list-line{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:calc(var(--spacing)*3);padding:calc(var(--spacing)*2) 0;border-bottom:1px solid var(--border);font-size:13px;min-width:0}
.list-line>div:first-child{min-width:0}
.list-line:last-child{border-bottom:0;padding-bottom:0}
.list-line strong{font-weight:500}
.list-line small{display:block;margin-top:calc(var(--spacing)*0.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pulse-meter{width:120px;max-width:100%}
.tag,.status-dot,.severity,.table-pill{display:inline-flex;align-items:center;justify-content:center;border-radius:999px}
.tag{padding:1px calc(var(--spacing)*2);background:var(--secondary);color:var(--secondary-foreground);font-size:11.5px;font-weight:500}
.status-dot{width:8px;height:8px;background:var(--chart-3)}
.severity{min-width:54px;padding:1px calc(var(--spacing)*2);background:var(--secondary);color:var(--secondary-foreground);font-size:11.5px;font-weight:500}
.severity.is-high{background:var(--destructive);color:var(--destructive-foreground)}
.severity.is-low{background:var(--accent);color:var(--accent-foreground)}
.chart-shell{display:grid;gap:calc(var(--spacing)*4)}
.chart-legend{display:flex;gap:calc(var(--spacing)*3);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:calc(var(--spacing)*2);color:var(--muted-foreground);font-size:12px}
.legend-swatch{width:10px;height:10px;border-radius:999px}
.sw1{background:var(--chart-1)}
.sw2{background:var(--chart-2)}
.sw3{background:var(--chart-3)}
.bar-chart{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));grid-template-rows:1fr;gap:calc(var(--spacing)*2);align-items:end;height:220px;padding-top:calc(var(--spacing)*4)}
.bar-wrap{height:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:calc(var(--spacing)*2)}
.chart-bar{width:100%;max-width:44px;border-radius:2px 2px 0 0;background:var(--chart-2)}
.chartTone2{background:var(--chart-2)}
.chartTone3{background:var(--chart-3)}
.chartTone4{background:var(--chart-4)}
.chartTone5{background:var(--chart-5)}
.chartH26{height:26%}
.chartH34{height:34%}
.chartH40{height:40%}
.chartH48{height:48%}
.chartH56{height:56%}
.chartH62{height:62%}
.chartH74{height:74%}
.chartH88{height:88%}
.bar-label{font-size:11px;color:var(--muted-foreground)}
.table-wrap{min-width:0;max-width:100%;overflow-x:auto;overflow-y:hidden}
.data-table{width:100%;min-width:620px;border-collapse:collapse;table-layout:fixed}
.data-table th,.data-table td{padding:calc(var(--spacing)*2.5) calc(var(--spacing)*3);border-bottom:1px solid var(--border);text-align:left;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle}
.data-table th{font:500 10.5px/1 var(--font-mono);text-transform:uppercase;letter-spacing:.06em;color:var(--muted-foreground)}
.data-table tr:last-child td{border-bottom:0}
.pipeline-table{min-width:0}
.pipeline-table th,.pipeline-table td{padding-left:calc(var(--spacing)*2);padding-right:calc(var(--spacing)*2)}
.pipeline-table th:first-child,.pipeline-table td:first-child{padding-left:0}
.pipeline-table th:last-child,.pipeline-table td:last-child{padding-right:0}
.pipeline-table th:nth-child(1),.pipeline-table td:nth-child(1){width:21%}
.pipeline-table th:nth-child(2),.pipeline-table td:nth-child(2){width:18%}
.pipeline-table th:nth-child(3),.pipeline-table td:nth-child(3){width:16%}
.pipeline-table th:nth-child(4),.pipeline-table td:nth-child(4){width:16%}
.pipeline-table th:nth-child(5),.pipeline-table td:nth-child(5){width:13%}
.pipeline-table th:nth-child(6),.pipeline-table td:nth-child(6){width:16%}
.routes-table{min-width:0}
.routes-table th:nth-child(1),.routes-table td:nth-child(1){width:34%}
.routes-table th:nth-child(n+2),.routes-table td:nth-child(n+2){width:22%}
.table-pill{padding:2px calc(var(--spacing)*2);font-size:11.5px;background:var(--accent);color:var(--accent-foreground);font-weight:500}
.table-pill.ready{background:var(--success-subtle);color:var(--success-strong)}
.table-pill.review{background:var(--primary);color:var(--primary-foreground)}
.table-action{padding:0 calc(var(--spacing)*2);height:26px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font:500 12px/1 var(--font-sans);color:var(--muted-foreground);display:inline-flex;align-items:center;gap:calc(var(--spacing)*1.5)}
.table-action:hover{background:var(--accent);color:var(--accent-foreground)}
.settings-layout{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(300px,.95fr);gap:calc(var(--spacing)*3);align-items:stretch}
.field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:calc(var(--spacing)*3)}
.field{display:grid;gap:calc(var(--spacing)*1.5)}
.field label{font-size:12px;color:var(--muted-foreground)}
.input-shell,.select-shell,.toggle-input{height:34px;display:flex;align-items:center;gap:calc(var(--spacing)*2.5);padding:0 calc(var(--spacing)*3);border:1px solid var(--input);border-radius:var(--radius);background:var(--background);font-size:13px}
.input-shell input{width:100%;border:0;background:transparent;outline:none;color:var(--foreground);font-size:13px}
.toggle-list{display:grid;gap:calc(var(--spacing)*2)}
.toggle-input{height:auto;min-height:38px;justify-content:space-between;cursor:pointer;padding:calc(var(--spacing)*2) calc(var(--spacing)*3);text-align:left}
.toggle-input>div:first-child{display:grid;gap:calc(var(--spacing)*0.5)}
.toggle-core{flex:none;width:32px;height:18px;border-radius:999px;background:var(--accent);padding:2px;display:flex;align-items:center}
.toggle-core span{width:14px;height:14px;border-radius:999px;background:var(--card);box-shadow:var(--shadow-xs);transition:transform .18s ease}
.toggle-input.is-on .toggle-core{background:var(--primary)}
.toggle-input.is-on .toggle-core span{transform:translateX(14px)}
.danger-card{border-color:var(--destructive)}
.danger-card .btn-secondary{border-color:var(--destructive);color:var(--destructive)}
.danger-card .btn-secondary:hover{background:var(--destructive);color:var(--destructive-foreground)}
.focusable:focus-visible{outline:none;box-shadow:0 0 0 2px var(--background),0 0 0 4px var(--ring)}
.disabled{opacity:.5;cursor:not-allowed}
.kpi-delta{display:inline-flex;align-items:center;gap:calc(var(--spacing)*1);color:var(--success-strong);font-size:12px;font-weight:500}
.kpi-delta.is-down{color:var(--destructive)}
.user-name{font-size:12.5px;font-weight:500;line-height:1.2}
.user-role{font-size:11.5px;line-height:1.2;color:var(--muted-foreground)}
.user-chip-text{display:flex;flex-direction:column;gap:1px;min-width:0}
.cell-lead>span,.pulse-name strong,.user-name,.user-role{min-width:0;overflow:hidden;text-overflow:ellipsis}
.card-actions .btn,.inline-actions .btn,.hero-actions .btn,.settings-actions .btn,.table-action{flex:none;max-width:100%}
.table-pill svg,.severity svg{margin-right:calc(var(--spacing)*1)}
.status-dot{position:relative}
@keyframes screenIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media (max-width:1080px){.topbar{padding:calc(var(--spacing)*3)}.screen-shell{padding:calc(var(--spacing)*3.5)}.panel-grid,.settings-layout{grid-template-columns:1fr}}
@media (max-width:900px){.app-shell,.uikit-shell{width:100%;grid-template-columns:1fr;height:auto;min-height:100vh;overflow:visible}.sidebar,.uikit-sidebar{height:auto;max-height:none;border-right:0;border-bottom:1px solid var(--sidebar-border)}.content,.uikit-main{height:auto;overflow:visible}.topbar{position:static}.uikit-responsive-grid,.metrics-grid,.overview-grid,.panel-grid,.settings-layout,.field-grid{grid-template-columns:1fr}.overview-main,.overview-side{grid-column:auto}.hero{flex-wrap:wrap}.search{max-width:none}}

html.dark .severity.is-high{background:var(--destructive);color:var(--destructive-foreground);border-color:var(--destructive)}

html.dark .progress-track,html.dark .spark-track{background:var(--muted)}

html.dark .danger-card{border-color:var(--destructive)}

}

function esc(value) {
  return String(value).replace(/[&<>"']/g, function (ch) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch];
  });
}

function actionButton(label, tone, iconName) {
  var map = { primary: "btn btn-primary", secondary: "btn btn-secondary", ghost: "btn btn-ghost" };
  var lead = iconName ? icon(iconName, 16) : "";
  return '<button class="' + map[tone || "secondary"] + ' uikit-action focusable">' + lead + '<span class="uikit-nowrap">' + esc(label) + "</span></button>";
}

function metricCard(metric) {
  var sparkBars = ["barH24", "barH32", "barH18", "barH40", "barH52", "barH40", "barH60", "barH68"];
  var spark = sparkBars.map(function (bar) {
    return '<div class="spark-bar ' + bar + '"></div>';
  }).join("");
  return (
    '<article class="card">' +
      '<div class="card-header">' +
        "<div><div class=\"eyebrow\">" + esc(metric.eyebrow) + "</div><h3>" + esc(metric.title) + "</h3></div>" +
        '<span class="metric-icon">' + icon(metric.icon, 18) + "</span>" +
      "</div>" +
      '<div class="metric-value">' + esc(metric.value) + "</div>" +
      '<div class="kpi-delta ' + (metric.trend === "down" ? "is-down" : "is-up") + '">' + icon(metric.trend === "down" ? "trending-down" : "trending-up", 14) + "<span>" + esc(metric.delta) + "</span></div>" +
      '<div class="progress-track"><div class="progress-fill ' + metric.progress + '"></div></div>' +
      '<div class="spark-track">' + spark + "</div>" +
      '<div class="metric-foot">' + esc(metric.note) + "</div>" +
    "</article>"
  );
}

function deploymentsCard() {
  var statusIcons = { ready: "circle-check", review: "eye", "": "clock" };
  var rows = pipelineRows.map(function (row) {
    return (
      "<tr>" +
        '<td><span class="cell-lead">' + icon("box", 15) + '<span class="uikit-truncate">' + esc(row.name) + "</span></span></td>" +
        '<td class="subtle"><span class="cell-lead">' + icon("git-branch", 14) + '<span class="uikit-truncate">' + esc(row.branch) + "</span></span></td>" +
        '<td><span class="table-pill ' + row.tone + ' uikit-nowrap">' + icon(statusIcons[row.tone], 13) + "<span>" + esc(row.status) + "</span></span></td>" +
        "<td>" + esc(row.duration) + "</td>" +
        "<td>" + esc(row.region) + "</td>" +
        '<td class="uikit-action-cell"><button class="table-action uikit-action focusable">' + icon("eye", 14) + '<span class="uikit-nowrap">Inspect</span></button></td>' +
      "</tr>"
    );
  }).join("");
  return (
    '<article class="card">' +
      '<div class="card-header">' +
        '<div><div class="eyebrow">Queue</div><h3>Deployment pipeline</h3></div>' +
        '<div class="inline-actions">' + actionButton("Deploy", "primary", "rocket") + actionButton("Preview", "ghost", "eye") + "</div>" +
      "</div>" +
      '<div class="table-wrap uikit-table-wrap"><table class="data-table pipeline-table">' +
        "<thead><tr><th>Project</th><th>Branch</th><th>Status</th><th>Duration</th><th>Region</th><th></th></tr></thead>" +
        "<tbody>" + rows + "</tbody>" +
      "</table></div>" +
      '<div class="table-note">Dense rows mirror the component previews: thin borders, quiet fills, and decisive emphasis only where action matters.</div>' +
    "</article>"
  );
}

function incidentCard() {
  var sevIcon = { "is-low": "circle-check", "": "clock", "is-high": "circle-alert" };
  var rows = incidents.map(function (item) {
    return (

          "<small>" + esc(item.detail) + "</small>" +
        "</div>" +
        '<span class="severity ' + item.className + '">' + esc(item.severity) + "</span>" +
      "</div>"
    );
  }).join("");
  return (
    '<article class="card">' +
      '<div class="card-header"><div><div class="eyebrow">Status</div><h3>Operations notes</h3></div><span class="header-icon">' + icon("activity", 18) + "</span></div>" +
      '<div class="list-stack">' + rows + "</div>" +
    "</article>"
  );
}

function overviewScreen() {

        "<p>A restrained dashboard for releases, observability, and routing decisions. The system stays mostly monochrome and saves color for data moments only.</p></div>" +
        '<div class="hero-actions">' + actionButton("Deploy now", "primary", "rocket") + actionButton("Open preview", "secondary", "eye") + "</div>" +
      "</div>" +
      '<div class="overview-grid uikit-responsive-grid">' + metrics + '<div class="overview-main">' + deploymentsCard() + '</div><div class="overview-side">' + incidentCard() + "</div></div>" +
    "</section>"
  );
}

    );
  }).join("");
  var regions = regionPulse.map(function (item) {
    return (
      '<div class="list-line">' +
        '<div><span class="pulse-name">' + icon("globe", 14) + "<strong>" + esc(item.name) + "</strong></span><small>" + esc(item.latency) + " median edge response</small></div>" +
        '<div class="pulse-meter"><div class="progress-track"><div class="progress-fill ' + item.fill + '"></div></div></div>' +
      "</div>"
    );
  }).join("");
  var routes = routeRows[state.range].map(function (row) {
    return (
      '<tr><td><span class="cell-lead">' + icon("scroll-text", 14) + '<span class="uikit-truncate">' + esc(row.route) + "</span></span></td><td>" + esc(row.requests) + "</td><td>" + esc(row.errors) + "</td><td>" + esc(row.latency) + "</td></tr>"
    );
  }).join("");
  return (
    '<section class="screen-shell">' +
      '<div class="hero">' +
        '<div><div class="eyebrow">Analytics</div><h1>Read demand before the next release lands.</h1>' +
        "<p>Chart blue appears only inside the insight panel, keeping the rest of the workspace consistent with the preview mood.</p></div>" +
        '<div class="hero-actions">' + actionButton("Export snapshot", "secondary", "save") + actionButton("Compare regions", "ghost", "globe") + "</div>" +
      "</div>" +
      '<div class="panel-grid">' +
        '<article class="card chart-shell">' +
          '<div class="card-header"><div><div class="eyebrow">Traffic</div><h3>Request load over ' + esc(state.range) + "</h3></div><span class=\"header-icon\">" + icon("chart-column", 18) + "</span></div>" +
          '<div class="chart-legend">' +
            '<div class="legend-item"><span class="legend-swatch sw1"></span><span>Warm cache</span></div>' +
            '<div class="legend-item"><span class="legend-swatch sw2"></span><span>Production</span></div>' +
            '<div class="legend-item"><span class="legend-swatch sw3"></span><span>Preview</span></div>' +
          "</div>" +
          '<div class="bar-chart">' + bars + "</div>" +
          '<div class="subtle">Peak load arrived with the newest preview promotion and remained inside the current latency budget.</div>' +
        "</article>" +
        '<article class="card">' +
          '<div class="card-header"><div><div class="eyebrow">Segments</div><h3>Region pulse</h3></div><span class="header-icon">' + icon("globe", 18) + "</span></div>" +
          '<div class="list-stack">' + regions + "</div>" +
        "</article>" +
      "</div>" +
      '<article class="card">' +
        '<div class="card-header"><div><div class="eyebrow">Routes</div><h3>Operational endpoints</h3></div>' +
        '<div class="card-actions">' + actionButton("Filter errors", "ghost", "list-filter") + actionButton("Open logs", "secondary", "scroll-text") + "</div></div>" +
        '<div class="table-wrap uikit-table-wrap"><table class="data-table routes-table">' +
          "<thead><tr><th>Route</th><th>Requests</th><th>Errors</th><th>Latency</th></tr></thead>" +
          "<tbody>" + routes + "</tbody>" +
        "</table></div>" +
      "</article>" +
    "</section>"
  );
}

function settingsScreen() {
  var toggles = settingsToggles.map(function (item) {
    var on = state.toggles[item.key] ? " is-on" : "";
    return (
      '<button class="toggle-input focusable' + on + '" data-toggle="' + item.key + '">' +
        "<div><strong>" + esc(item.title) + '</strong><div class="settings-note">' + esc(item.note) + "</div></div>" +
        '<div class="toggle-core"><span></span></div>' +
      "</button>"
    );
  }).join("");
  return (
    '<section class="screen-shell">' +
      '<div class="hero">' +
        '<div><div class="eyebrow">Settings</div><h1>Keep release rules exact and visible.</h1>' +
        "<p>The settings view keeps one focused tab with concise controls, avoiding the noise of rendering every configuration mode at once.</p></div>" +
        '<div class="hero-actions">' + actionButton("Save changes", "primary", "save") + actionButton("Discard", "ghost") + "</div>" +
      "</div>" +
      '<div class="settings-layout">' +
        '<article class="card">' +
          '<div class="card-header"><div><div class="eyebrow">Environment</div><h3>Deployment policy</h3></div><span class="header-icon">' + icon("server", 18) + "</span></div>" +
          '<div class="field-grid">' +
            '<div class="field"><label for="project-name">Project name</label><div class="input-shell">' + icon("box", 15) + '<input id="project-name" value="platform-observability"></div></div>' +
            '<div class="field"><label for="owner-team">Owner team</label><div class="select-shell" id="owner-team">Core platform</div></div>' +
            '<div class="field"><label for="region-policy">Primary region</label><div class="select-shell" id="region-policy">Frankfurt</div></div>' +
            '<div class="field"><label for="rollback">Rollback window</label><div class="select-shell" id="rollback">30 minutes</div></div>' +
          "</div>" +
          '<div class="field-note">Precise labels, quiet surfaces, and no decorative accent blocks preserve the tone established by the preview cards and buttons.</div>' +
        "</article>" +
        '<article class="card">' +
          '<div class="card-header"><div><div class="eyebrow">Automation</div><h3>Operational toggles</h3></div><span class="header-icon">' + icon("settings", 18) + "</span></div>" +
          '<div class="toggle-list">' + toggles + "</div>" +
        "</article>" +
      "</div>" +
      '<article class="card danger-card">' +
        '<div class="card-header"><div><div class="eyebrow">Danger zone</div><h3>Pause production promotions</h3></div><span class="header-icon is-danger">' + icon("shield", 18) + "</span></div>" +
        '<p class="settings-note">Use the pause action only when release integrity or customer routing is under investigation.</p>' +
        '<div class="settings-actions">' + actionButton("Pause promotions", "secondary", "lock") + actionButton("View audit log", "ghost", "scroll-text") + "</div>" +
      "</article>" +
    "</section>"
  );
}

function sidebar() {
  var nav = navItems.map(function (item) {
    var active = state.view === item.key ? " active" : "";
    return (
      '<button class="nav-item focusable' + active + '" data-view="' + item.key + '">' +
        icon(item.icon, 16) + "<span>" + esc(item.label) + "</span>" +
      "</button>"
    );
  }).join("");
  var primary = sidebarPrimary.map(function (item) {
    return '<button class="nav-item focusable">' + icon(item.icon, 16) + "<span>" + esc(item.label) + "</span></button>";
  }).join("");
  var recent = sidebarRecent.map(function (label) {
    return (
      '<button class="recent-item focusable">' +
        '<span class="recent-dot"></span>' +
        '<span class="recent-text">' + esc(label) + "</span>" +
      "</button>"
    );
  }).join("");
  return (
    '<aside class="sidebar uikit-sidebar">' +
      '<button class="workspace focusable" aria-label="Switch workspace">' +
        '<span class="ws-avatar"></span>' +
        '<span class="ws-name">Personal</span>' +
        icon("chevrons-up-down", 14) +
        '<span class="ws-collapse">' + icon("panel-left", 14) + "</span>" +
      "</button>" +
      '<button class="cta focusable">' +
        "<span>New Chat</span>" + icon("chevron-down", 14) +
      "</button>" +
      '<div class="nav-list">' + primary + "</div>" +
      '<button class="section-head focusable"><span>Workspaces</span>' + icon("chevron-down", 12) + "</button>" +
      '<div class="nav-list">' + nav + "</div>" +
      '<button class="section-head focusable"><span>Favorites</span>' + icon("chevron-right", 12) + "</button>" +
      '<button class="section-head focusable"><span>Recent Chats</span>' + icon("chevron-down", 12) + "</button>" +
      '<div class="recent-list">' + recent +
        '<button class="recent-item is-more focusable"><span class="recent-dot">' + icon("more-horizontal", 14) + "</span><span class=\"recent-text\">More</span></button>" +
      "</div>" +
      '<div class="nav-meta">' +
        '<button class="user-pill focusable">' +
          '<span class="ws-avatar"></span>' +
          '<span class="user-handle">yamada2333</span>' +
          '<span class="plan-badge">$5</span>' +
        "</button>" +
      "</div>" +
    "</aside>"
  );
}

function topbar() {
  var pills = ["24h", "7d", "30d"].map(function (item) {
    var active = state.range === item ? " active" : "";
    return '<button class="pill-toggle focusable' + active + '" data-range="' + item + '">' + item + "</button>";
  }).join("");
  return (
    '<header class="topbar uikit-toolbar">' +
      '<div class="search">' + icon("search", 16) + '<input aria-label="Search" placeholder="Search projects, routes, and incidents"></div>' +
      '<div class="toolbar">' +
        '<div class="view-switch" role="tablist" aria-label="Time range">' + pills + "</div>" +
        '<button class="icon-btn focusable" aria-label="Notifications">' + icon("bell", 16) + "</button>" +
        '<button class="icon-btn focusable" aria-label="Command menu">' + icon("command", 16) + "</button>" +
        '<div class="user-chip"><div class="avatar">AH</div><div class="user-chip-text"><div class="user-name">Ari Hoffman</div><div class="user-role">Platform owner</div></div></div>' +
      "</div>" +
    "</header>"
  );
}

function currentScreen() {
  if (state.view === "analytics") return analyticsScreen();
  if (state.view === "settings") return settingsScreen();
  return overviewScreen();
}

function render() {
  document.getElementById("root").innerHTML =
    '<div class="app-shell uikit-shell" data-layout-guard="uikit-v1" style="--uikit-sidebar-w:240px">' + sidebar() + '<main class="content uikit-main">' + topbar() + currentScreen() + "</main></div>";
}

document.getElementById("root").addEventListener("click", function (event) {
  var navBtn = event.target.closest("[data-view]");
  if (navBtn) { state.view = navBtn.getAttribute("data-view"); render(); return; }

  var rangeBtn = event.target.closest("[data-range]");
  if (rangeBtn) { state.range = rangeBtn.getAttribute("data-range"); render(); return; }

  var toggleBtn = event.target.closest("[data-toggle]");
  if (toggleBtn) {
    var key = toggleBtn.getAttribute("data-toggle");
    state.toggles[key] = !state.toggles[key];
    render();
  }
});

render();
</script>
</body>
</html>
