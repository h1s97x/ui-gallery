<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body { margin: 0; padding: 12px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); } .row { display: flex; align-items: center; gap: calc(var(--spacing) * 2); margin-bottom: calc(var(--spacing) * 2); flex-wrap: wrap; } .label { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted-foreground); min-width: 94px; } .divider { border: 0; border-top: 1px solid var(--border); margin: calc(var(--spacing) * 3) 0; } .nav-shell { display: inline-flex; align-items: center; gap: calc(var(--spacing) * 1.5); padding: calc(var(--spacing) * 1.25); border: 1px solid var(--sidebar-border); border-radius: var(--radius); background: var(--sidebar); box-shadow: var(--shadow-sm); } .top { min-width: 350px; justify-content: space-between; } .sectioned { min-width: 230px; flex-direction: column; align-items: stretch; } .nav-group { display: inline-flex; gap: calc(var(--spacing) * 1); } .sectioned .nav-group { flex-direction: column; } .nav-link { border: 0; background: transparent; color: var(--sidebar-foreground); border-radius: calc(var(--radius) * .65); padding: calc(var(--spacing) * .8) calc(var(--spacing) * 1.5); font-size: 12px; line-height: 1.2; display: inline-flex; align-items: center; gap: calc(var(--spacing) * .75); } .nav-link:hover { background: var(--accent); color: var(--accent-foreground); } .nav-link:focus-visible { outline: 2px solid var(--sidebar-ring); outline-offset: 1px; } .nav-link.active { background: var(--sidebar-accent); color: var(--sidebar-accent-foreground); box-shadow: var(--shadow-xs); } .badge { min-width: 18px; padding: 0 calc(var(--spacing) * .6); border-radius: 999px; font-size: 10px; text-align: center; background: var(--primary); color: var(--primary-foreground); } .utility { color: var(--muted-foreground); font-size: 11px; } .is-disabled { opacity: .45; pointer-events: none; filter: grayscale(0.1); }</style>
</head>
<body>
  <div class="row"><span class="label">top active</span><nav class="nav-shell top"><div class="nav-group"><button class="nav-link active">Overview</button><button class="nav-link">Signals</button><button class="nav-link">Console</button></div><span class="utility">UTC+0</span></nav><nav class="nav-shell top is-disabled" aria-disabled="true"><div class="nav-group"><button class="nav-link active">Overview</button><button class="nav-link">Signals</button><button class="nav-link">Console</button></div><span class="utility">Locked</span></nav></div>
  <hr class="divider">
  <div class="row"><span class="label">sectioned compact</span><nav class="nav-shell sectioned"><div class="nav-group"><button class="nav-link active">Overview<span class="badge">4</span></button><button class="nav-link">Signals<span class="badge">2</span></button><button class="nav-link">Console</button></div><span class="utility">Ops Feed</span></nav><nav class="nav-shell sectioned is-disabled" aria-disabled="true"><div class="nav-group"><button class="nav-link active">Overview<span class="badge">4</span></button><button class="nav-link">Signals<span class="badge">2</span></button><button class="nav-link">Console</button></div><span class="utility">Paused</span></nav></div>
</body>
</html>
