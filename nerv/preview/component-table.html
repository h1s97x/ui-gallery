<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nerv Table Preview</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:12px;background:var(--background);color:var(--foreground);font:12px/1.4 var(--font-sans)}.row{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;margin-bottom:8px}.label{width:100%;font:600 10px/1 var(--font-mono);letter-spacing:.12em;text-transform:uppercase;color:var(--muted-foreground)}.divider{height:1px;border:0;background:var(--border);margin:8px 0}.table{min-width:300px;flex:1 1 300px;background:var(--card);border:1px solid var(--border);border-radius:calc(var(--radius)*.75);box-shadow:var(--shadow-sm);overflow:hidden}.table.disabled{opacity:.48;filter:saturate(.7)}.head,.r{display:grid;grid-template-columns:1.4fr .9fr .9fr .7fr;gap:calc(var(--spacing)*2);padding:calc(var(--spacing)*2.5) calc(var(--spacing)*3);align-items:center}.head{background:var(--accent);color:var(--accent-foreground);font:600 10px/1 var(--font-mono);letter-spacing:.08em;text-transform:uppercase}.r+.r{border-top:1px solid var(--border)}.r.sel{background:color-mix(in srgb,var(--accent) 30%,transparent)}.r.alert{background:color-mix(in srgb,var(--destructive) 14%,var(--card))}.node strong{display:block;font-size:12px}.node span,.meta{color:var(--muted-foreground);font-size:11px}.pill{justify-self:start;padding:4px 8px;border-radius:999px;background:var(--accent);color:var(--accent-foreground);font:600 10px/1 var(--font-mono)}.pill.down{background:var(--destructive);color:var(--destructive-foreground)}.num{font:600 11px/1 var(--font-mono)}.compact .head,.compact .r{padding:calc(var(--spacing)*2) calc(var(--spacing)*2.5)}</style>
</head>
<body>
<div class="row"><span class="label">Default</span><div class="table"><div class="head"><span>Node</span><span>Status</span><span>Uptime</span><span>Load</span></div><div class="r"><div class="node"><strong>Node-17</strong><span>Edge relay</span></div><span class="pill">Stable</span><span class="num">42d</span><span class="meta">31%</span></div><div class="r sel"><div class="node"><strong>Node-22</strong><span>Core sync</span></div><span class="pill">Active</span><span class="num">18d</span><span class="meta">64%</span></div></div><div class="table disabled"><div class="head"><span>Node</span><span>Status</span><span>Uptime</span><span>Load</span></div><div class="r"><div class="node"><strong>Node-31</strong><span>Queued maintenance</span></div><span class="pill">Paused</span><span class="num">0d</span><span class="meta">--</span></div><div class="r"><div class="node"><strong>Node-44</strong><span>Standby mirror</span></div><span class="pill">Idle</span><span class="num">7d</span><span class="meta">12%</span></div></div></div>
<hr class="divider">
<div class="row"><span class="label">Alert Compact</span><div class="table compact"><div class="head"><span>Node</span><span>Status</span><span>Uptime</span><span>Load</span></div><div class="r alert"><div class="node"><strong>Node-09</strong><span>Packet loss spike</span></div><span class="pill down">Degraded</span><span class="num">3h</span><span class="meta">92%</span></div><div class="r"><div class="node"><strong>Node-12</strong><span>Auto recovery</span></div><span class="pill">Stable</span><span class="num">11d</span><span class="meta">44%</span></div></div></div>
</body>
</html>
