<!doctype html>

<head>

<style>body{margin:0;padding:12px;background:var(--color-surface);color:var(--color-text);font:13px/1.4 var(--font-sans)}.r{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap}.l{width:100%;font:600 10px/1 var(--font-mono);letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-muted)}hr{margin:8px 0;border:0;border-top:1px solid var(--color-border)}.p{flex:1 1 220px;min-width:220px;padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface);box-shadow:var(--shadow-sm)}[aria-disabled=true]{opacity:.45;background:var(--color-surface-muted)}.h,.f,.w{display:flex;justify-content:space-between;gap:var(--space-4);font-size:11px;color:var(--color-text-muted)}.t{font-size:13px;font-weight:600;color:var(--color-text)}.b{display:flex;align-items:flex-end;gap:var(--space-4);height:112px;margin-top:12px;padding-top:8px;border-top:1px solid var(--color-border)}.b i{flex:1;border-radius:var(--radius-md) var(--radius-md) 0 0}.b i:nth-child(1){height:44%;background:var(--chart-2)}.b i:nth-child(2){height:72%;background:var(--chart-3)}.b i:nth-child(3){height:58%;background:var(--chart-4)}.b i:nth-child(4){height:86%;background:var(--chart-5)}.n{position:relative;height:112px;margin-top:12px;border-top:1px solid var(--color-border)}.n:before,.n:after{content:"";position:absolute;border-top:2px solid var(--chart-3);transform-origin:left bottom}.n:before{width:54%;left:8%;bottom:34px;transform:skewY(-18deg)}.n:after{width:40%;left:52%;bottom:72px;border-color:var(--chart-5);transform:skewY(20deg)}.n i{position:absolute;width:8px;height:8px;border:2px solid var(--color-surface);border-radius:50%;background:var(--chart-2)}.n i:nth-child(1){left:12%;bottom:28px}.n i:nth-child(2){left:42%;bottom:58px;background:var(--chart-3)}.n i:nth-child(3){left:76%;bottom:82px;background:var(--chart-5)}.x{display:flex;align-items:center;gap:12px;margin-top:12px}.d{width:88px;height:88px;border-radius:50%;background:conic-gradient(var(--chart-5) 0 32%,var(--chart-3) 32% 64%,var(--chart-1) 64% 100%);position:relative;flex:none}.d:after{content:"";position:absolute;inset:18px;border-radius:50%;background:var(--color-surface)}.s{display:grid;gap:6px}.s span{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--color-text-muted)}.s i{width:10px;height:10px;border-radius:50%;background:var(--chart-1)}.s span:nth-child(2) i{background:var(--chart-3)}.s span:nth-child(3) i{background:var(--chart-5)}</style>
</head>

<div class="r"><span class="l">Bar default</span><article class="p"><div class="h"><span class="t">Revenue</span><span>Overview</span></div><div class="b"><i></i><i></i><i></i><i></i></div><div class="f"><span>Active Users</span><span>+18%</span></div></article><article class="p" aria-disabled="true"><div class="h"><span class="t">Revenue</span><span>Paused</span></div><div class="b"><i></i><i></i><i></i><i></i></div><div class="f"><span>Settings</span><span>Offline</span></div></article></div>

<div class="r"><span class="l">Line highlighted</span><article class="p"><div class="h"><span class="t">Active Users</span><span>Team</span></div><div class="n"><i></i><i></i><i></i></div><div class="f"><span>Overview</span><span>Thu peak</span></div></article><article class="p"><div class="h"><span class="t">Team</span><span>Settings</span></div><div class="x"><div class="d"></div><div class="s"><span><i></i>Overview 18%</span><span><i></i>Revenue 32%</span><span><i></i>Settings 50%</span></div></div></article></div>
