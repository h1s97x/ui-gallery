<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibecamp Dashboard UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box}
    html,body,#root{height:auto;min-height:0}
    body{
      margin:0;
      background:var(--background);
      color:var(--foreground);
      font-family:var(--font-sans);
      letter-spacing:var(--tracking-normal);
      -webkit-font-smoothing:antialiased;
    }
    button,input{font:inherit}
    button{
      border:0;
      background:none;
      color:inherit;
      cursor:pointer;
    }
    :focus-visible{
      outline:none;
      box-shadow:0 0 0 2px var(--background),0 0 0 4px var(--ring);
    }
    .app{
      display:flex;
      flex-direction:column;
      min-height:0;
      color:var(--foreground);
      background:var(--background);
    }
    .dark.app{
      background:var(--background);
    }
    .uikit-shell{
      width:100%;
      max-width:1184px;
      margin:0 auto;
      min-height:0;
      height:auto;
      align-items:stretch;
      overflow:hidden;
    }
    .uikit-sidebar{
      min-width:0;
    }
    .uikit-main,
    .uikit-toolbar{
      min-width:0;
    }
    .uikit-responsive-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
    }
    .uikit-table-wrap{
      max-width:100%;
      overflow-x:auto;
      overscroll-behavior-x:contain;
    }
    .uikit-truncate{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .uikit-nowrap{
      white-space:nowrap;
      flex-shrink:0;
    }
    .uikit-action-cell{
      max-width:160px;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .uikit-action{
      max-width:120px;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .shell{
      display:grid;
      grid-template-columns:264px minmax(0,1fr);
      grid-template-rows:auto;
      min-height:0;
      align-items:stretch;
      transition:grid-template-columns .24s ease;
    }
    .shell.collapsed{grid-template-columns:92px minmax(0,1fr)}
    .sidebar{
      position:sticky;
      top:0;
      align-self:stretch;
      min-height:100%;
      height:auto;
      padding:20px 16px 18px;
      display:flex;
      flex-direction:column;
      gap:18px;
      background:color-mix(in srgb,var(--sidebar) 88%, var(--card));
      border-right:1px solid var(--sidebar-border);
      backdrop-filter:blur(14px);
    }
    .sidebar-head,.profile{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .brand{
      flex:1;
      min-width:0;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .brand-mark,
    .avatar{
      width:42px;
      height:42px;
      border-radius:14px;
      display:grid;
      place-items:center;
      flex:none;
    }
    .brand-mark{
      background:linear-gradient(160deg,var(--primary),color-mix(in srgb,var(--primary) 72%, black));
      color:var(--primary-foreground);
      font:700 22px/1 var(--font-serif);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.14);
    }
    .avatar{
      background:var(--secondary);
      color:var(--secondary-foreground);
      font-weight:700;
    }
    .brand-copy,.profile-copy,.rail-note,.nav-text{
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      transition:opacity .2s ease,max-width .2s ease;
    }
    .brand-copy strong,.profile-copy strong{
      display:block;
      font-size:15px;
    }
    .brand-copy span,.profile-copy span,.micro,.muted{
      color:var(--muted-foreground);
    }
    .brand-copy span,.profile-copy span,.micro{
      font-size:12px;
    }
    .collapse{
      width:40px;
      height:40px;
      flex:none;
      border:1px solid var(--border);
      border-radius:16px;
      background:color-mix(in srgb,var(--card) 82%, transparent);
    }
    .nav-group{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .section-label{
      padding:0 10px;
      font:700 11px/1 var(--font-mono);
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted-foreground);
    }
    .nav-item{
      width:100%;
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px 14px;
      border:1px solid transparent;
      border-radius:18px;
      text-align:left;
      transition:background .16s ease,border-color .16s ease,transform .16s ease,color .16s ease;
    }
    .nav-item:hover{background:color-mix(in srgb,var(--sidebar-accent) 24%, transparent)}
    .nav-item.active{
      background:var(--sidebar-accent);
      color:var(--sidebar-accent-foreground);
      border-color:color-mix(in srgb,var(--sidebar-border) 70%, transparent);
    }
    .nav-glyph{
      width:28px;
      height:28px;
      border-radius:12px;
      display:grid;
      place-items:center;
      flex:none;
      font-size:14px;
      background:color-mix(in srgb,var(--card) 45%, transparent);
    }
    .nav-item.active .nav-glyph{
      background:color-mix(in srgb,var(--card) 16%, transparent);
    }
    .sidebar-spotlight{
      padding:16px;
      border:1px solid var(--border);
      border-radius:22px;
      background:linear-gradient(180deg,color-mix(in srgb,var(--card) 88%, transparent),color-mix(in srgb,var(--accent) 76%, transparent));
    }
    .sidebar-spotlight strong{
      display:block;
      font-size:16px;
      margin:6px 0 4px;
    }
    .profile{
      margin-top:auto;
      padding:12px;
      border-radius:20px;
      border:1px solid var(--border);
      background:color-mix(in srgb,var(--card) 84%, transparent);
    }
    .shell.collapsed .brand-copy,
    .shell.collapsed .profile-copy,
    .shell.collapsed .nav-text,
    .shell.collapsed .sidebar-spotlight .rail-note,
    .shell.collapsed .sidebar-spotlight strong,
    .shell.collapsed .sidebar-spotlight .section-label{
      opacity:0;
      max-width:0;
    }
    .shell.collapsed .sidebar{
      padding-inline:12px;
    }
    .shell.collapsed .nav-item{
      justify-content:center;
      padding-inline:0;
    }
    .shell.collapsed .brand,
    .shell.collapsed .profile{
      justify-content:center;
    }
    .shell.collapsed .sidebar-spotlight{
      padding:14px 10px;
      display:grid;
      place-items:center;
    }
    .shell.collapsed .sidebar-spotlight::before{
      content:"•";
      color:var(--primary);
      font-size:24px;
      line-height:1;
    }
    .main{
      min-width:0;
      min-height:0;
      height:auto;
      display:flex;
      flex-direction:column;
      padding:28px;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:22px;
      flex-wrap:wrap;
    }
    .search{
      min-width:260px;
      flex:1;
      max-width:420px;
      height:46px;
      padding:0 16px;
      display:flex;
      align-items:center;
      gap:12px;
      border:1px solid var(--border);
      border-radius:18px;
      background:color-mix(in srgb,var(--card) 82%, transparent);
    }
    .search input{
      width:100%;
      border:0;
      outline:none;
      background:transparent;
      color:var(--foreground);
    }
    .search-mark{
      width:26px;
      text-align:center;
      color:var(--muted-foreground);
      flex:none;
    }
    .toolbar{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .btn,
    .chip,
    .icon-btn,
    .toggle,
    .table-link{
      transition:background .16s ease,border-color .16s ease,color .16s ease,transform .16s ease,filter .16s ease;
    }
    .btn,
    .chip,
    .icon-btn,
    .toggle,
    .field,
    .table-link{
      border:1px solid var(--border);
      border-radius:18px;
    }
    .btn:active,.chip:active,.icon-btn:active,.toggle:active,.table-link:active,.nav-item:active,.collapse:active{transform:scale(.98)}
    .btn,.chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-height:42px;
      padding:0 16px;
      white-space:nowrap;
      font-weight:600;
    }
    .btn.primary{
      background:var(--primary);
      color:var(--primary-foreground);
      border-color:var(--primary);
    }
    .btn.secondary{
      background:var(--secondary);
      color:var(--secondary-foreground);
      border-color:var(--secondary);
    }
    .btn.ghost,.chip,.icon-btn,.table-link{
      background:color-mix(in srgb,var(--card) 80%, transparent);
      color:var(--foreground);
    }
    .btn.ghost:hover,.chip:hover,.icon-btn:hover,.table-link:hover{
      background:color-mix(in srgb,var(--accent) 88%, transparent);
    }
    .btn.primary:hover{
      filter:brightness(.97);
    }
    .btn.secondary:hover{
      background:color-mix(in srgb,var(--secondary) 90%, var(--accent));
    }
    .chip{
      min-height:36px;
      padding-inline:14px;
      font:600 12px/1 var(--font-mono);
      letter-spacing:.04em;
      text-transform:uppercase;
    }
    .chip.active{
      background:var(--primary);
      border-color:var(--primary);
      color:var(--primary-foreground);
    }
    .icon-btn{
      width:42px;
      height:42px;
      display:grid;
      place-items:center;
    }
    .page{
      display:flex;
      flex-direction:column;
      flex:0 0 auto;
      gap:18px;
      min-height:0;
      height:auto;
      animation:fadeUp .28s ease;
    }
    .hero{
      border:1px solid var(--border);
      border-radius:30px;
      overflow:hidden;
      background:
        radial-gradient(circle at 92% 8%, color-mix(in srgb,var(--primary) 11%, transparent) 0, transparent 28%),
        linear-gradient(140deg,color-mix(in srgb,var(--card) 92%, transparent) 0%,color-mix(in srgb,var(--muted) 84%, transparent) 58%,color-mix(in srgb,var(--accent) 72%, transparent) 100%);
    }
    .hero-inner{
      display:grid;
      grid-template-columns:minmax(0,1.45fr) minmax(320px,.9fr);
      gap:0;
      min-height:356px;
    }
    .hero-copy{
      padding:34px 34px 28px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:28px;
      min-width:0;
      position:relative;
    }
    .hero-copy::before{
      content:"";
      position:absolute;
      inset:30px 34px auto auto;
      width:88px;
      height:1px;
      background:color-mix(in srgb,var(--border) 60%, transparent);
    }
    .hero-copy::after{
      content:"";
      position:absolute;
      inset:auto auto 30px 34px;
      width:180px;
      height:1px;
      background:color-mix(in srgb,var(--border) 66%, transparent);
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font:700 11px/1 var(--font-mono);
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted-foreground);
    }
    .hero-kicker{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }
    .hero-index{
      font:700 11px/1 var(--font-mono);
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted-foreground);
    }
    .hero-copy h1{
      margin:16px 0 0;
      max-width:11ch;
      font:600 clamp(40px,5vw,74px)/.92 var(--font-serif);
      letter-spacing:-.03em;
    }
    .hero-lead{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(220px,.48fr);
      gap:20px;
      align-items:end;
    }
    .hero-copy p{
      margin:18px 0 0;
      max-width:58ch;
      font-size:15px;
      line-height:1.7;
      color:var(--muted-foreground);
    }
    .hero-side-note{
      padding-left:20px;
      border-left:1px solid color-mix(in srgb,var(--border) 66%, transparent);
      font-size:12px;
      line-height:1.65;
      color:var(--muted-foreground);
    }
    .hero-meta{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:22px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:34px;
      padding:0 14px;
      border-radius:999px;
      background:color-mix(in srgb,var(--card) 62%, transparent);
      border:1px solid color-mix(in srgb,var(--border) 72%, transparent);
      font-size:12px;
      color:var(--foreground);
    }
    .status-dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--chart-3);
      box-shadow:0 0 0 6px color-mix(in srgb,var(--chart-3) 16%, transparent);
    }
    .hero-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:28px;
    }
    .hero-summary{
      position:relative;
      min-width:0;
      padding:28px;
      border-left:1px solid color-mix(in srgb,var(--border) 72%, transparent);
      background:
        radial-gradient(circle at top left,color-mix(in srgb,var(--primary) 13%, transparent) 0,transparent 44%),
        linear-gradient(180deg,color-mix(in srgb,var(--secondary) 12%, transparent),color-mix(in srgb,var(--card) 86%, transparent));
    }
    .dark .hero-summary{
      background:
        radial-gradient(circle at top left,color-mix(in srgb,var(--primary) 17%, transparent) 0,transparent 42%),
        linear-gradient(180deg,color-mix(in srgb,var(--secondary) 30%, transparent),color-mix(in srgb,var(--card) 86%, transparent));
    }
    .summary-card{
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:18px;
    }
    .summary-card h2{
      margin:10px 0 8px;
      font-size:30px;
      line-height:1.04;
      letter-spacing:-.03em;
    }
    .summary-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px 18px;
      padding-top:18px;
      border-top:1px solid color-mix(in srgb,var(--border) 72%, transparent);
    }
    .summary-grid div strong,
    .metric-slot strong,
    .rail-stat strong,
    .focus-stat strong{
      display:block;
      font-size:20px;
      line-height:1.05;
      letter-spacing:-.03em;
    }
    .summary-note{
      padding:14px 16px;
      border-radius:20px;
      background:color-mix(in srgb,var(--card) 70%, transparent);
      border:1px solid color-mix(in srgb,var(--border) 74%, transparent);
      line-height:1.55;
      color:var(--muted-foreground);
      font-size:13px;
    }
    .summary-band{
      display:grid;
      gap:10px;
    }
    .summary-line{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding-top:10px;
      border-top:1px solid color-mix(in srgb,var(--border) 72%, transparent);
    }
    .summary-line:first-child{
      border-top:0;
      padding-top:0;
    }
    .band{
      display:grid;
      grid-template-columns:1.2fr repeat(3,minmax(0,.86fr));
      gap:0;
      border:1px solid var(--border);
      border-radius:26px;
      overflow:hidden;
      background:
        linear-gradient(180deg,color-mix(in srgb,var(--card) 88%, transparent),color-mix(in srgb,var(--card) 80%, var(--background)));
    }
    .band-intro,
    .metric-slot{
      padding:22px 24px;
      min-width:0;
    }
    .band-intro{
      position:relative;
      background:linear-gradient(180deg,color-mix(in srgb,var(--card) 90%, transparent),color-mix(in srgb,var(--accent) 74%, transparent));
    }
    .band-intro::after{
      content:"";
      position:absolute;
      left:24px;
      right:24px;
      bottom:22px;
      height:2px;
      border-radius:999px;
      background:linear-gradient(90deg,color-mix(in srgb,var(--foreground) 44%, transparent) 0 12%,color-mix(in srgb,var(--primary) 74%, transparent) 38%,color-mix(in srgb,var(--chart-2) 46%, transparent) 82%,transparent 100%);
      opacity:.8;
    }
    .band-intro h2{
      max-width:14ch;
      margin:10px 0 10px;
      font-size:28px;
      line-height:1.08;
      letter-spacing:-.03em;
    }
    .band-intro p{
      padding-bottom:30px;
      margin:0;
      line-height:1.64;
      font-size:14px;
      color:var(--muted-foreground);
    }
    .metric-slot + .metric-slot,
    .metric-slot + .band-intro,
    .band-intro + .metric-slot{
      border-left:1px solid color-mix(in srgb,var(--border) 74%, transparent);
    }
    .metric-slot{
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:14px;
      background:linear-gradient(180deg,color-mix(in srgb,var(--card) 54%, transparent),transparent);
    }
    .metric-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }
    .delta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:28px;
      padding:0 10px;
      border-radius:999px;
      background:color-mix(in srgb,var(--accent) 92%, transparent);
      font:600 11px/1 var(--font-mono);
      letter-spacing:.04em;
    }
    .metric-footer{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
    }
    .metric-rule{
      width:44px;
      height:2px;
      border-radius:999px;
      background:color-mix(in srgb,var(--foreground) 20%, transparent);
      flex:none;
    }
    .content-grid{
      display:grid;
      grid-template-columns:minmax(0,1.4fr) minmax(300px,.82fr);
      gap:18px;
    }
    .duo-stage{
      display:grid;
      grid-template-columns:minmax(0,1.4fr) minmax(300px,.82fr);
      gap:0;
      border:1px solid var(--border);
      border-radius:28px;
      overflow:hidden;
      background:
        radial-gradient(circle at top right,color-mix(in srgb,var(--primary) 9%, transparent) 0,transparent 24%),
        linear-gradient(180deg,color-mix(in srgb,var(--card) 90%, transparent),color-mix(in srgb,var(--card) 82%, var(--background)));
    }
    .duo-stage > .panel,
    .duo-stage > .rail{
      border:0;
      border-radius:0;
      background:transparent;
      overflow:visible;
    }
    .duo-stage > .rail{
      border-left:1px solid color-mix(in srgb,var(--border) 76%, transparent);
      background:
        linear-gradient(180deg,color-mix(in srgb,var(--card) 32%, transparent),color-mix(in srgb,var(--accent) 36%, transparent));
    }
    .duo-stage .panel-head,
    .duo-stage .stage-head{
      padding-top:26px;
    }
    .duo-stage .table-shell,
    .duo-stage .note-list{
      padding-bottom:26px;
    }
    .duo-stage .rail-block:first-child{
      padding-top:26px;
    }
    .panel,
    .stage-panel,
    .settings-shell{
      border:1px solid var(--border);
      border-radius:28px;
      background:color-mix(in srgb,var(--card) 84%, transparent);
      overflow:hidden;
    }
    .panel-head,
    .stage-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      padding:24px 24px 0;
      flex-wrap:wrap;
    }
    .panel-title h2,.stage-copy h2,.settings-hero h2{
      margin:8px 0 0;
      font-size:28px;
      line-height:1.05;
      letter-spacing:-.03em;
    }
    .panel-title p,.stage-copy p,.settings-hero p{
      margin:10px 0 0;
      max-width:62ch;
      font-size:14px;
      line-height:1.6;
      color:var(--muted-foreground);
    }
    .board-ribbon{
      display:flex;
      align-items:center;
      gap:16px;
      padding:18px 24px 0;
      flex-wrap:wrap;
      color:var(--muted-foreground);
      font-size:12px;
    }
    .board-ribbon span{
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .board-ribbon span::before{
      content:"";
      width:6px;
      height:6px;
      border-radius:999px;
      background:currentColor;
      opacity:.55;
    }
    .table-shell{padding:14px 24px 24px}
    .table{
      width:100%;
      border-collapse:collapse;
    }
    .table th,.table td{
      padding:16px 0;
      border-top:1px solid color-mix(in srgb,var(--border) 76%, transparent);
      text-align:left;
      vertical-align:middle;
    }
    .table th{
      padding-top:0;
      border-top:0;
      font:700 11px/1 var(--font-mono);
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted-foreground);
    }
    .row-title strong{
      display:block;
      font-size:15px;
      margin-bottom:4px;
    }
    .table-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:0 12px;
      font-size:12px;
      font-weight:600;
      white-space:nowrap;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:30px;

    const SETTINGS_FIELDS = {

    function UIButton({ children, variant = "primary", ...props }) {

    function Toggle({ value, onChange }) {

    }

    function LineChart({ values }) {
      const width = 680;
      const height = 260;
      const paddingX = 24;
      const max = Math.max(...values) + 10;
      const min = Math.min(...values) - 8;
      const points = values.map((value, index) => {
        const x = paddingX + (index * ((width - paddingX * 2) / (values.length - 1)));
        const ratio = (value - min) / (max - min || 1);
        const y = height - 20 - ratio * (height - 56);
        return [x, y];
      });
      const line = points.map(([x, y]) => `${x},${y}`).join(" ");
      const area = `${points[0][0]},${height} ${line} ${points[points.length - 1][0]},${height}`;
      return (
        <svg className="chart-svg" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="0%">

              <stop offset="100%" stopColor="var(--chart-5)" />

            </linearGradient>

          <polyline fill="url(#areaGlow)" stroke="none" points={area} />
          <polyline fill="none" stroke="url(#lineGlow)" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" points={line} />
          {points.map(([x, y], index) => (
            <g key={index}>
              <circle cx={x} cy={y} r="7" fill="color-mix(in srgb,var(--background) 88%, var(--card))" />
              <circle cx={x} cy={y} r="4" fill={index === points.length - 1 ? "var(--primary)" : "var(--chart-2)"} />
            </g>
          ))}

    }

    function App() {
      const [view, setView] = useState("overview");
      const [collapsed, setCollapsed] = useState(false);
      const [dark, setDark] = useState(false);
      const [range, setRange] = useState("30d");
      const [query, setQuery] = useState("");
      const [selectedSession, setSelectedSession] = useState(SESSION_ROWS[0]);
      const [message, setMessage] = useState("");
      const [settings, setSettings] = useState({
        autoPublish: true,
        digest: true,

      const filteredRows = useMemo(() => {
        const q = query.trim().toLowerCase();
        if (!q) return SESSION_ROWS;
        return SESSION_ROWS.filter(row => [row.title, row.stage, row.host, row.status].join(" ").toLowerCase().includes(q));
      }, [query]);

      const currentRange = RANGE_DATA[range];

      const analyticsStats = useMemo(() => {
        if (range === "7d") {
          return [
            { label: "Return curve", value: "42%", note: "Audience came back within 48h." },

          ];

        if (range === "90d") {
          return [
            { label: "Return curve", value: "51%", note: "Seasonal repeat visits remain elevated." },
            { label: "Host response", value: "16m", note: "Faster than seasonal baseline." },
            { label: "Escalation share", value: "3.8%", note: "Slightly above ideal but stable." }
          ];
        }
        return [
          { label: "Return curve", value: "47%", note: "Audience came back within 48h." },
          { label: "Host response", value: "17m", note: "Median approval reaction time." },
          { label: "Escalation share", value: "3.4%", note: "Below the watch threshold." }
