<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:12px;background:var(--background);color:var(--foreground);font:500 14px/1.4 var(--font-sans)}.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 8px}.label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-foreground);min-width:64px}.divider{border:0;border-top:1px solid var(--border);margin:10px 0}.btn{display:inline-flex;align-items:center;justify-content:center;gap:calc(var(--spacing)*2);min-height:40px;padding:0 calc(var(--spacing)*4);border:1px solid transparent;border-radius:var(--radius);box-shadow:var(--shadow-xs);font:600 13px/1 var(--font-sans);letter-spacing:var(--tracking-normal);cursor:pointer;transition:background-color .16s ease,color .16s ease,border-color .16s ease,transform .16s ease}.btn:focus-visible{outline:2px solid var(--ring);outline-offset:2px}.btn:active{transform:translateY(1px)}.btn-primary{background:var(--primary);color:var(--primary-foreground)}.btn-primary:hover{filter:brightness(.96)}.btn-secondary{background:var(--secondary);color:var(--secondary-foreground);border-color:var(--secondary)}.btn-secondary:hover{filter:brightness(1.08)}.btn-ghost{background:transparent;color:var(--foreground);border-color:var(--border);min-height:32px;padding:0 calc(var(--spacing)*3)}.btn-ghost:hover{background:var(--accent);color:var(--accent-foreground)}.btn:disabled{background:var(--muted);color:var(--muted-foreground);border-color:var(--border);box-shadow:none;cursor:not-allowed;transform:none;filter:none}</style>
</head>
<body>
<div class="row"><span class="label">Primary</span><button class="btn btn-primary">Create Session</button><button class="btn btn-primary">Publish Update</button><button class="btn btn-primary" disabled>View Insights</button></div>
<hr class="divider">
<div class="row"><span class="label">Secondary</span><button class="btn btn-secondary">Create Session</button><button class="btn btn-secondary" disabled>Publish Update</button><button class="btn btn-ghost">View Insights</button></div>
</body>
</html>
