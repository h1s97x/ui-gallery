<style>body{margin:0;padding:12px;background:var(--background);color:var(--foreground);font:13px/1.4 var(--font-sans)}.r{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 8px}.l{width:100%;font:600 10px/1 var(--font-mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted-foreground)}.c{flex:1 1 190px;min-width:190px;padding:calc(var(--spacing)*3.5);border:1px solid var(--border);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow-sm)}.c:hover{border-color:var(--ring)}.m,.g,.f{display:flex;gap:8px}.m,.f{justify-content:space-between}.t{margin:0;font-size:14px}.x,.g,.f{font-size:11px;color:var(--muted-foreground)}.x{color:var(--chart-2);font-weight:600}.g{flex-wrap:wrap;margin-top:calc(var(--spacing)*2)}.k{display:inline-flex;align-items:center;gap:4px}.d{width:8px;height:8px;border-radius:99px}.a{background:var(--chart-1)}.b{background:var(--chart-2)}.n{background:var(--chart-3)}.bars{display:flex;align-items:flex-end;gap:8px;height:96px;margin-top:calc(var(--spacing)*3)}.bars span{flex:1;border-radius:var(--radius) var(--radius) 0 0}.bars span:nth-child(1){height:60%;background:var(--chart-1)}.bars span:nth-child(2){height:84%;background:var(--chart-2)}.bars span:nth-child(3){height:52%;background:var(--chart-4)}.bars span:nth-child(4){height:94%;background:var(--chart-3)}.f{margin-top:calc(var(--spacing)*2)}.off{background:var(--muted);opacity:.58;pointer-events:none;box-shadow:var(--shadow-xs)}.divider{margin:10px 0;border:0;border-top:1px solid var(--border)}.s{width:100%;height:92px;margin-top:calc(var(--spacing)*3)}.s path{fill:none;stroke:var(--chart-2);stroke-width:3;stroke-linecap:round;stroke-linejoin:round}.w{display:flex;align-items:center;gap:12px;margin-top:calc(var(--spacing)*3)}.o{width:84px;height:84px;border-radius:99px;background:conic-gradient(var(--chart-1) 0 42%,var(--chart-2) 42% 74%,var(--chart-3) 74%);position:relative;box-shadow:inset 0 0 0 1px var(--border)}.o:after{content:"";position:absolute;inset:18px;border-radius:99px;background:var(--card)}.v{display:grid;gap:6px;font-size:11px;color:var(--muted-foreground)}</style>
</head>
