<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:12px;background:var(--background);color:var(--foreground);font:13px/1.4 var(--font-sans)}.row{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start;margin-bottom:8px}.label{width:100%;font:600 10px/1 var(--font-mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted-foreground)}.sidebar{display:flex;flex-direction:column;gap:calc(var(--spacing)*3);width:170px;min-height:228px;padding:calc(var(--spacing)*4);border:1px solid var(--sidebar-border);border-radius:var(--radius);background:var(--sidebar);color:var(--sidebar-foreground);box-shadow:var(--shadow)}.brand{display:grid;gap:2px;padding-bottom:calc(var(--spacing)*2);border-bottom:1px solid var(--sidebar-border)}.brand b{font-size:13px}.brand span,.section{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-foreground)}.nav{display:grid;gap:calc(var(--spacing)*1.5)}.item{display:flex;align-items:center;gap:calc(var(--spacing)*2);padding:calc(var(--spacing)*2) calc(var(--spacing)*2.5);border-radius:calc(var(--radius) - 8px);color:inherit;text-decoration:none;background:transparent;transition:background .16s ease,color .16s ease,outline-color .16s ease}.item:hover{background:var(--accent)}.item:focus-visible{outline:2px solid var(--sidebar-ring);outline-offset:1px}.item.active{background:var(--sidebar-primary);color:var(--sidebar-primary-foreground)}.item.accent{background:var(--sidebar-accent);color:var(--sidebar-accent-foreground)}.item.disabled{opacity:.46;pointer-events:none}.dot{width:8px;height:8px;border-radius:999px;background:currentColor;flex:none}.foot{margin-top:auto;padding-top:calc(var(--spacing)*2);border-top:1px solid var(--sidebar-border);font-size:11px;color:var(--muted-foreground)}.compact{width:154px;min-height:204px;padding:calc(var(--spacing)*3)}.collapsed{width:68px;min-height:204px;align-items:center;padding:calc(var(--spacing)*3)}.collapsed .brand,.collapsed .section,.collapsed .foot{display:none}.collapsed .nav{width:100%}.collapsed .item{justify-content:center;padding:calc(var(--spacing)*2.5)}.collapsed .dot{width:24px;height:24px;border-radius:calc(var(--radius) - 6px);display:grid;place-items:center;font:600 11px/1 var(--font-mono)}.divider{margin:10px 0;border:0;border-top:1px solid var(--border)}</style>
</head>
<body>
<div class="row"><span class="label">primary</span><aside class="sidebar"><div class="brand"><b>Vibecamp</b><span>Dashboard</span></div><div><div class="section">Workspace</div><nav class="nav"><a class="item active" href="#"><span class="dot"></span>Dashboard</a><a class="item" href="#"><span class="dot"></span>Check-ins</a><a class="item disabled" aria-disabled="true"><span class="dot"></span>Channels</a></nav></div><div class="foot">2 live rooms</div></aside><aside class="sidebar"><div class="brand"><b>Vibecamp</b><span>Dashboard</span></div><div><div class="section">Workspace</div><nav class="nav"><a class="item" href="#"><span class="dot"></span>Dashboard</a><a class="item active" href="#"><span class="dot"></span>Check-ins</a><a class="item" href="#"><span class="dot"></span>Channels</a></nav></div><div class="foot">Crew sync at 4:30</div></aside></div>
<hr class="divider">
<div class="row"><span class="label">compact</span><aside class="sidebar compact"><div><div class="section">Quick access</div><nav class="nav"><a class="item accent" href="#"><span class="dot"></span>Check-ins</a><a class="item" href="#"><span class="dot"></span>Dashboard</a><a class="item" href="#"><span class="dot"></span>Channels</a></nav></div></aside><aside class="sidebar collapsed" aria-label="Collapsed sidebar"><nav class="nav"><a class="item active" href="#" aria-label="Dashboard"><span class="dot">D</span></a><a class="item" href="#" aria-label="Check-ins"><span class="dot">C</span></a><a class="item disabled" aria-disabled="true" aria-label="Channels"><span class="dot">H</span></a></nav></aside></div>
</body>
</html>
