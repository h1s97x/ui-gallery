<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Explorer - TraeWork</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="../../components.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="../../scaffold.css" />
  <style>
    /*
     * Static Solo/Home Work-state migration.
     * Source of visual truth: the running Solo Registry Home preview.
     * Constraints: no copied assets, no image refs, no runtime scripts,
     * no project structure changes.
     */

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-width: 0;
      min-height: 960px;
      margin: 0;
      overflow: auto;
      background: var(--bg-base-secondary);
      color: var(--text-default);
      font-family: var(--body-base-font-family);
      letter-spacing: var(--body-md-letter-spacing);
    }

    body {
      padding: 0;
    }

    button {
      font: inherit;
    }

    .solo-home-shell {
      position: relative;
      display: flex;
      --task-list-panel-width: calc(var(--spacer-64) * 4 + var(--spacer-40) + var(--spacer-4));
      --solo-home-main-gutter-y: var(--spacer-8);
      --solo-home-main-gutter-right: var(--spacer-8);
      --solo-home-main-content-inset: clamp(var(--spacer-48), 8vw, calc(var(--spacer-64) * 2));
      width: min(1680px, 100%);
      min-width: 0;
      height: 960px;
      overflow: hidden;
      border: 1px solid var(--border-neutral-l2);
      border-radius: var(--radius-8);
      background: var(--bg-base-secondary);
      color: var(--text-default);
      font-family: var(--body-base-font-family);
      font-size: var(--heading-sm-font-size);
      line-height: var(--heading-sm-line-height);
    }

    .solo-home-shell > .task-list-panel {
      position: relative;
      z-index: 2;
      flex: 0 0 var(--task-list-panel-width, 300px);
      border-radius: 0;
      box-shadow: none;
    }

    .task-list-panel {
      --task-list-panel-width: calc(var(--spacer-64) * 4 + var(--spacer-40) + var(--spacer-4));
      --task-list-content-width: calc(var(--task-list-panel-width) - 24px);
      position: relative;
      display: flex;
      width: var(--task-list-panel-width);
      height: 960px;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-base-secondary);
      color: var(--text-default);
      font-family: var(--body-base-font-family);
    }

    .task-list-panel-topbar {
      display: flex;
      height: 64px;
      flex-shrink: 0;
      align-items: center;
      gap: var(--spacer-8);
      padding: var(--spacer-0) var(--spacer-12);
    }

    .task-list-panel-traffic {
      display: flex;
      width: 64px;
      height: 28px;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
      gap: var(--spacer-6);
    }

    .task-list-panel-traffic-dot {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      border-radius: var(--radius-full);
    }

    .task-list-panel-traffic-dot[data-color="red"] { background: var(--status-error-default); }
    .task-list-panel-traffic-dot[data-color="yellow"] { background: var(--status-warning-default); }
    .task-list-panel-traffic-dot[data-color="green"] { background: var(--status-success-default); }

    .task-list-panel-topbar-actions {
      display: flex;
      width: 70px;
      flex-shrink: 0;
      align-items: flex-start;
      gap: var(--spacer-6);
    }

    .task-list-panel-icon-button {
      display: inline-grid;
      width: 32px;
      height: 32px;
      place-items: center;
      border: 0;
      border-radius: var(--radius-6);
      background: transparent;
      color: var(--text-default);
      cursor: default;
      padding: 0;
      transition: background-color 160ms ease;
    }

    .task-list-panel-icon-button:hover {
      background: var(--bg-overlay-l1);
    }

    .task-list-panel-mode {
      display: flex;
      align-items: center;
      padding: var(--spacer-0) var(--spacer-12) var(--spacer-12);
    }

    .mode-switch {
      position: relative;
      display: flex;
      width: 202px;
      height: 32px;
      align-items: center;
      gap: var(--spacer-4);
      border-radius: var(--radius-8);
      background: var(--bg-overlay-l2);
      padding: var(--spacer-2) var(--spacer-10) var(--spacer-2) var(--spacer-2);
    }

    .mode-switch-active-indicator {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 70px;
      height: 28px;
      border: calc(var(--border-width-default) / 2) solid var(--border-neutral-l3);
      border-radius: var(--radius-6);
      background: var(--bg-base-default);
      box-shadow: 0 1px 2px color-mix(in srgb, var(--text-default) 8%, transparent);
    }

    .mode-switch-segment {
      position: relative;
      z-index: 1;
      display: inline-flex;
      min-width: 0;
      height: 28px;
      align-items: center;
      justify-content: center;
      gap: var(--spacer-4);
      border: 0;
      border-radius: var(--radius-full);
      background: transparent;
      color: var(--text-default);
      cursor: default;
      font-size: var(--body-base-font-size);
      font-weight: var(--body-base-font-weight);
      letter-spacing: var(--body-base-letter-spacing);
      line-height: var(--body-base-line-height);
      padding: var(--spacer-2) var(--spacer-8);
      white-space: nowrap;
    }

    .mode-switch-segment:nth-of-type(2) { width: 70px; }
    .mode-switch-segment:nth-of-type(3) { width: 51px; }
    .mode-switch-segment:nth-of-type(4) { width: 61px; }

    .mode-switch-icon {
      display: inline-grid;
      width: 0;
      height: 16px;
      flex: 0 0 auto;
      place-items: center;
      overflow: hidden;
      opacity: 0;
    }

    .mode-switch-segment.active .mode-switch-icon {
      width: 16px;
      opacity: 1;
    }

    .task-list-panel-quick-actions {
      display: flex;
      flex-direction: column;
      gap: var(--spacer-2);
      padding: var(--spacer-0) var(--spacer-12) var(--spacer-12);
    }

    .task-list-panel-quick-action {
      display: flex;
      height: 34px;
      align-items: center;
      gap: var(--spacer-8);
      border-radius: var(--radius-8);
      color: var(--text-default);
      cursor: default;
      padding: var(--spacer-0) var(--spacer-6);
      transition: background-color 160ms ease;
    }

    .task-list-panel-quick-action:hover {
      background: var(--bg-overlay-l1);
    }

    .task-list-panel-quick-action.selected,
    .task-list-panel-quick-action.selected:hover {
      background: var(--bg-overlay-l2);
    }

    .task-list-panel-quick-action-icon {
      display: inline-grid;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      place-items: center;
      color: var(--brand-grey-700);
    }

    .task-list-panel-quick-action-label {
      font-size: var(--body-base-font-size);
      font-weight: var(--body-base-font-weight);
      letter-spacing: var(--body-base-letter-spacing);
      line-height: var(--body-base-line-height);
    }

    .task-list-panel-content {
      display: flex;
      min-height: 0;
      flex: 1 1 auto;
      flex-direction: column;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .task-list-panel-content::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .task-list-panel-section {
      display: flex;
      flex-direction: column;
      gap: var(--spacer-2);
      padding: var(--spacer-4) var(--spacer-12) var(--spacer-12);
    }

    .task-list-panel-section-header {
      display: flex;
      width: 100%;
      height: 32px;
      align-items: center;
      gap: var(--spacer-4);
    }

    .task-list-panel-section-toggle {
      display: flex;
      min-width: 0;
      height: 32px;
      flex: 1;
      align-items: center;
      gap: var(--spacer-4);
      border: 0;
      border-radius: var(--radius-6);
      background: transparent;
      color: var(--brand-grey-500);
      cursor: default;
      padding: var(--spacer-4) var(--spacer-8);
    }

    .task-list-panel-section-title {
      color: currentColor;
      font-size: var(--body-base-font-size);
      font-weight: var(--body-base-font-weight);
      letter-spacing: var(--body-base-letter-spacing);
      line-height: var(--body-base-line-height);
    }

    .task-list-panel-section-chevron {
      display: inline-grid;
      width: 16px;
      height: 16px;
      place-items: center;
      color: currentColor;
    }

    .task-list-panel-section-chevron .task-row-svg,
    .task-list-panel-section-chevron .task-row-svg svg {
      width: 16px;
      height: 16px;
    }

    .task-list-panel-section-trailing {
      display: flex;
      align-items: center;
      gap: var(--spacer-4);
      padding-right: var(--spacer-4);
    }

    .task-list-panel-section-icon {
      display: inline-grid;
      width: 24px;
      height: 24px;
      place-items: center;
      border-radius: var(--radius-6);
      color: var(--brand-grey-500);
    }

    .task-list-panel-section-body {
      display: grid;
      grid-template-rows: 1fr;
      overflow: hidden;
      opacity: 1;
    }

    .task-list-panel-section-body-inner {
      display: flex;
      min-height: 0;
      flex-direction: column;
      gap: var(--spacer-2);
    }

    .task-list-panel-cluster {
      display: flex;
      flex-direction: column;
      gap: var(--spacer-2);
    }

    .task-list-panel-cluster-body {
      display: grid;
      grid-template-rows: 1fr;
      overflow: hidden;
      opacity: 1;
    }

    .task-list-panel-cluster-body-inner {
      display: flex;
      min-height: 0;
      flex-direction: column;
      gap: var(--spacer-2);
    }

    .task-list-panel .task-row,
    .task-list-panel .cluster-row-item,
    .task-list-panel .cluster-row-control {
      width: var(--task-list-content-width);
    }

    .cluster-row-item {
      position: relative;
      display: grid;
      gap: var(--spacer-4);
      margin: 0;
    }

    .cluster-row-control {
      display: flex;
      width: 276px;
      height: 32px;
      align-items: center;
      gap: var(--spacer-4);
      border-radius: var(--radius-8);
      color: var(--brand-grey-500);
      padding: var(--spacer-4);
    }

    .cluster-row-toggle {
      display: flex;
      min-width: 0;
      flex: 1;
      align-items: center;
      gap: var(--spacer-4);
      border: 0;
      background: transparent;
      color: currentColor;
      cursor: default;
      font: inherit;
      padding: 0;
      text-align: left;
    }

    .cluster-row-leading,
    .cluster-row-chat,
    .cluster-row-more {
      position: relative;
      display: grid;
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
      place-items: center;
    }


    .cluster-row-label {
      min-width: 0;
      flex: 1;
      overflow: hidden;
      font-size: var(--body-base-font-size);
      font-weight: var(--body-base-font-weight);
      letter-spacing: var(--body-base-letter-spacing);
      line-height: var(--body-base-line-height);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cluster-row-kind-icon {
      position: absolute;
    }

    .cluster-row-kind-icon-cloud-git {
      transform-origin: center;
    }



    .task-row {
      display: flex;
      width: 276px;
      height: 32px;
      align-items: center;
      gap: var(--spacer-4);
      overflow: hidden;
      border: 0;
      border-radius: var(--radius-6);
      background: transparent;
      color: var(--text-default);
      font: inherit;
      padding: var(--spacer-4);
      text-align: left;
      transform-origin: center top;
    }

    .task-row:hover {
      background: var(--bg-overlay-l1);
    }

    .task-row.selected,
    .task-row.selected:hover {
      background: var(--bg-overlay-l2);
    }

    .task-row-pin-slot,
    .task-row-kind-slot,
    .task-row-status-slot,
    .task-row-action {
      display: grid;
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
      place-items: center;
    }

    .task-row-status-slot {
      width: auto;
      min-width: 24px;
    }

    .task-row-kind-slot {
      color: var(--icon-tertiary);
    }

    .task-row-pin-slot {
      border: 0;
      background: transparent;
      color: var(--brand-grey-400);
      cursor: default;
      opacity: 0;
      padding: 0;
    }

    .task-row.pinned .task-row-pin-slot,
    .task-row:hover .task-row-pin-slot {
      opacity: 1;
    }

    .task-row-main {
      display: flex;
      min-width: 0;
      height: 24px;
      flex: 1;
      align-items: center;
      gap: var(--spacer-4);
      border: 0;
      background: transparent;
      color: inherit;
      cursor: default;
      font: inherit;
      padding: 0;
      text-align: left;
    }

    .task-row-title {
      min-width: 0;
      flex: 1;
      overflow: hidden;
      color: var(--text-default);
      font-size: var(--body-base-font-size);
      font-weight: var(--body-base-font-weight);
      letter-spacing: var(--body-base-letter-spacing);
      line-height: var(--body-base-line-height);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-row-status-slot:empty {
      display: none;
    }

    .task-row-actions {
      display: none;
      align-items: center;
      gap: var(--spacer-4);
    }

    .task-row.selected .task-row-actions {
      display: flex;
    }

    .task-row-more {
      border-radius: var(--radius-6);
      color: var(--icon-default);
      transform: rotate(90deg);
      transform-origin: 50% 50%;
    }

    .task-row-tree {
      border: 0.5px solid var(--border-neutral-l3);
      border-radius: var(--radius-6);
      background: var(--bg-white);
      color: var(--icon-default);
    }

    .loading-icon {
      display: grid;
      width: 16px;
      height: 16px;
      place-items: center;
    }

    .loading-icon svg {
      width: 100%;
      height: 100%;
    }

    .loading-icon-track,
    .loading-icon-indicator {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.6;
    }

    .loading-icon-track {
      opacity: 0.32;
    }

    .loading-icon-indicator {
      stroke-dasharray: 14 24;
      stroke-linecap: round;
    }

    .loading-icon-spinner {
      transform-box: view-box;
      transform-origin: center;
      animation: loading-icon-spin 900ms linear infinite;
    }

    @keyframes loading-icon-spin {
      to { transform: rotate(360deg); }
    }

    .task-row-loading-icon {
      color: color-mix(in srgb, var(--brand-grey-500) 50%, var(--brand-grey-400));
    }

    .task-list-panel-user-row {
      position: relative;
      z-index: 3;
      display: flex;
      height: 56px;
      flex-shrink: 0;
      align-items: center;
      background: var(--bg-base-secondary);
      padding: var(--spacer-12);
    }

    .task-list-panel-user-trigger {
      display: flex;
      width: var(--task-list-content-width);
      min-width: 0;
      height: 36px;
      align-items: center;
      gap: var(--spacer-8);
      border: 0;
      border-radius: var(--radius-6);
      background: transparent;
      color: inherit;
      cursor: default;
      padding: var(--spacer-4);
      text-align: left;
    }

    .task-list-panel-user-trigger:hover {
      background: var(--bg-overlay-l1);
    }

    .task-list-panel-user-avatar-wrap {
      position: relative;
      display: inline-flex;
      width: 28px;
      height: 28px;
      flex: 0 0 auto;
    }

    .task-list-panel-user-avatar {
      display: grid;
      width: 28px;
      height: 28px;
      place-items: center;
      border-radius: var(--radius-6);
      background: var(--text-tertiary);
      color: var(--text-onbrand);
      flex-shrink: 0;
      font-size: var(--heading-xs-font-size);
      font-weight: var(--heading-xs-font-weight);
    }

    .task-list-panel-user-name {
      color: var(--text-default);
      font-size: var(--heading-xs-font-size);
      font-weight: var(--body-md-strong-font-weight);
      letter-spacing: var(--body-base-letter-spacing);
      line-height: var(--body-base-line-height);
    }

    .task-list-panel-user-tag {
      display: inline-flex;
      height: 16px;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-4);
      background: var(--bg-overlay-l2);
      color: var(--text-tertiary);
      font-size: var(--body-sm-strong-font-size);
      font-weight: var(--body-md-strong-font-weight);
      letter-spacing: var(--body-md-letter-spacing);
      line-height: var(--body-sm-strong-line-height);
      padding: var(--spacer-0) var(--spacer-4);
    }

    .task-list-panel-resize-handle {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      width: 8px;
      border: 0;
      background: transparent;
      pointer-events: none;
    }

    .task-list-panel-resize-handle::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent 0%, var(--border-neutral-l1) 16%, var(--border-neutral-l3) 50%, var(--border-neutral-l1) 84%, transparent 100%);
      opacity: 0;
    }

    .solo-home-main {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
      height: 944px;
      margin: var(--solo-home-main-gutter-y) var(--solo-home-main-gutter-right) var(--solo-home-main-gutter-y) 0;
      overflow: hidden;
      border-radius: var(--radius-8);
      background: var(--bg-white);
    }

    .solo-home-corner-action {
      position: absolute;
      z-index: 2;
      top: 18px;
      right: 22px;
      display: inline-grid;
      width: 32px;
      height: 32px;
      place-items: center;
      border: 0;
      border-radius: var(--radius-8);
      background: transparent;
      color: var(--icon-default);
      cursor: default;
      padding: 0;
    }

    .solo-home-corner-action:hover {
      background: var(--bg-base-secondary);
    }

    .solo-home-center {
      position: absolute;
      z-index: 1;
      top: 255px;
      left: 50%;
      display: flex;
      width: min(780px, calc(100% - var(--solo-home-main-content-inset)));
      max-width: calc(100% - 24px);
      flex-direction: column;
      align-items: center;
      transform: translateX(-50%);
    }

    .solo-home-mode-content {
      display: flex;
      width: 100%;
      flex-direction: column;
      align-items: center;
      animation: solo-home-mode-enter 220ms cubic-bezier(0.16, 1, 0.3, 1) both;
      will-change: opacity, transform;
    }

    @keyframes solo-home-mode-enter {
      from { opacity: 0; transform: translate3d(0, 6px, 0); }
      to { opacity: 1; transform: translate3d(0, 0, 0); }
    }

    .solo-home-title {
      display: flex;
      height: 42px;
      align-items: center;
      justify-content: center;
      gap: var(--spacer-12);
      color: var(--text-default);
    }

    .solo-home-title .task-row-svg,
    .solo-home-title .task-row-svg svg {
      width: 36px;
      height: 36px;
    }

    .solo-home-title-text {
      display: inline-flex;
      align-items: center;
      margin: 0;
      font-size: var(--heading-3xl-font-size);
      font-weight: var(--body-md-strong-font-weight);
      letter-spacing: var(--body-md-letter-spacing);
      line-height: var(--heading-3xl-line-height);
    }

    .solo-home-title-letter {
      display: inline-block;
      height: 41px;
      overflow: hidden;
      transform: translateZ(0);
      vertical-align: top;
    }

    .solo-home-title-letter-stack {
      display: flex;
      flex-direction: column;
      transform: translate3d(0, 0, 0);
    }

    .solo-home-title-letter-stack span {
      display: block;
      height: 41px;
      line-height: var(--heading-3xl-line-height);
    }

    .solo-home-title-space {
      display: inline-block;
      width: 0.38em;
    }

    .solo-chatbox {
      display: flex;
      width: 100%;
      height: 178px;
      flex-direction: column;
      align-items: flex-start;
      overflow: clip;
      border-radius: var(--radius-16);
      background: var(--bg-base-secondary);
      margin-top: var(--spacer-48);
    }

    .solo-chatbox-input {
      display: flex;
      width: 100%;
      height: 134px;
      flex: 0 0 auto;
      flex-direction: column;
      align-items: flex-start;
      overflow: clip;
      border: 1px solid var(--border-neutral-l2);
      border-radius: var(--radius-16);
      background: var(--bg-white);
      box-shadow: 0 2px 8px color-mix(in srgb, var(--text-default) 6%, transparent);
    }

    .solo-chatbox-prompt {
      display: flex;
      width: 100%;
      height: 82px;
      flex: 0 0 auto;
      align-items: flex-start;
      padding: var(--spacer-16) var(--spacer-16) var(--spacer-2);
    }

    .solo-chatbox-prompt p {
      display: -webkit-box;
      width: 100%;
      height: 20px;
      margin: 0;
      overflow: hidden;
      color: var(--text-disabled);
      font-size: var(--body-base-font-size);
      font-weight: var(--body-base-font-weight);
      letter-spacing: var(--body-md-letter-spacing);
      line-height: var(--body-base-line-height);
      white-space: normal;
      -webkit-box-orient: vertical;

      align-items: center;

      height: 32px;
      flex: 1 1 0;
      align-items: center;
      gap: var(--spacer-4);

      display: flex;
      height: 32px;
      flex: 0 0 auto;
      align-items: center;
      gap: var(--spacer-8);
    }

    .solo-chatbox-action-trailing {
      display: flex;
      flex: 0 0 auto;
      align-items: flex-start;
      gap: var(--spacer-8);
    }

    .solo-chatbox-action-controls {
      display: flex;
      align-items: flex-start;
    }

    .solo-chatbox button {
      display: inline-flex;
      align-items: center;
      border: 0;
      border-radius: var(--radius-full);
      background: transparent;
      color: var(--icon-default);
      cursor: default;
      font-family: var(--body-md-font-family);
      font-size: var(--body-md-font-size);
      font-weight: var(--body-base-font-weight);
      line-height: var(--body-md-line-height);
      padding: 0;
    }

    .solo-chatbox button:hover,
    .solo-chatbox button:focus-visible {

      outline: none;
    }

    .solo-chatbox .solo-chatbox-icon-button,
    .solo-chatbox .solo-chatbox-send-button {
      width: 32px;
      height: 32px;
      justify-content: center;
    }

    .solo-chatbox .solo-chatbox-tool-button,
    .solo-chatbox .solo-chatbox-plugin-button {
      border: 1px solid var(--border-neutral-l1);
    }

    .solo-chatbox .solo-chatbox-plugin-button {
      height: 32px;
      justify-content: center;
      gap: var(--spacer-4);
      padding: var(--spacer-0) var(--spacer-8);
    }

    .solo-chatbox-plugin-count {
      flex: 0 0 auto;
      color: var(--text-disabled);
      font-family: var(--body-md-strong-font-family);
      font-size: var(--body-md-font-size);
      font-weight: var(--body-md-strong-font-weight);
      line-height: var(--body-md-strong-line-height);
    }

    .solo-chatbox-action-divider {
      display: flex;
      width: 8px;
      height: 12px;
      flex: 0 0 auto;
      align-items: center;
      justify-content: center;
    }

    .solo-chatbox-action-divider::before {
      content: "";
      width: 1px;
      height: 11px;
      border-radius: var(--radius-full);
      background: var(--border-neutral-l2);
    }

    .solo-chatbox-fast-pass {
      display: inline-flex;
      max-width: 168px;
      height: 32px;
      flex: 0 0 auto;
      align-items: center;
      gap: var(--spacer-2);
      border-radius: var(--radius-full);
      color: var(--text-disabled);
      font-family: var(--body-md-strong-font-family);
      font-size: var(--body-md-font-size);
      font-weight: var(--body-md-strong-font-weight);
      line-height: var(--body-md-line-height);
      padding: var(--spacer-0) var(--spacer-3);
      white-space: nowrap;
    }

    .solo-chatbox .solo-chatbox-model-button {
      width: 131px;
      height: 32px;
      justify-content: center;
      gap: var(--spacer-4);
      color: var(--text-tertiary);
      font-size: var(--body-md-font-size);
      font-weight: var(--body-base-font-weight);
      line-height: var(--body-md-line-height);
      padding: var(--spacer-0) var(--spacer-6);
    }

    .solo-chatbox .solo-chatbox-model-button span {
      flex: 0 0 auto;
      color: inherit;
      font-size: inherit;
      font-weight: inherit;
      line-height: inherit;
      white-space: nowrap;
    }

    .solo-chatbox .solo-chatbox-send-button {
      background: var(--bg-brand-disabled);
      color: var(--text-tertiary);
      cursor: not-allowed;
    }

    .solo-chatbox .solo-chatbox-send-button:hover,

      background: var(--bg-brand-disabled);
      color: var(--text-tertiary);
    }

      height: 44px;
      flex: 0 0 auto;
      align-items: center;
      gap: var(--spacer-8);
      padding: var(--spacer-6) var(--spacer-12);

      gap: var(--spacer-8);

      font-size: var(--heading-xs-font-size);
      font-weight: var(--body-base-font-weight);
      line-height: var(--heading-xs-line-height);
      padding: var(--spacer-0) var(--spacer-6);

      height: 16px;

    }

      width: 15px;
      height: 15px;
    }


    .solo-home-suggestion-row {

      width: min(748px, 100%);
      min-height: 48px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: var(--spacer-8);
      margin-top: var(--spacer-32);
    }

    .solo-home-suggestion-chip {
      display: inline-flex;
      height: 48px;
      align-items: center;
      justify-content: center;
      gap: var(--spacer-4);

      border-radius: var(--radius-16);
      background: var(--bg-white);
      box-shadow: 0 1px 2px color-mix(in srgb, var(--text-default) 2%, transparent);
      color: var(--text-default);
      cursor: default;
      font-size: var(--body-base-font-size);
      font-weight: var(--body-base-font-weight);
      letter-spacing: var(--body-md-letter-spacing);
      line-height: var(--body-base-line-height);
      padding: var(--spacer-0) var(--spacer-16);
      white-space: nowrap;

      background: var(--bg-base-secondary);

      }
    }

    @media (max-width: 1440px) {
      .solo-home-shell {
        --solo-home-main-gutter-y: var(--spacer-6);
        --solo-home-main-gutter-right: var(--spacer-6);
        --solo-home-main-content-inset: clamp(var(--spacer-40), 7vw, calc(var(--spacer-64) + var(--spacer-32)));

    }

    @media (max-width: 1080px) {
      .solo-home-shell {
        --solo-home-main-gutter-y: var(--spacer-4);
        --solo-home-main-gutter-right: var(--spacer-4);
        --solo-home-main-content-inset: clamp(var(--spacer-24), 6vw, calc(var(--spacer-48) + var(--spacer-8)));
      }
    }

    @media (max-width: 860px) {
      .solo-home-shell {
        --solo-home-main-gutter-y: var(--spacer-2);
        --solo-home-main-gutter-right: var(--spacer-2);
        --solo-home-main-content-inset: var(--spacer-20);
      }

      .solo-chatbox-action-row {
        gap: var(--spacer-6);
        padding: var(--spacer-8);
      }

      .solo-chatbox-action-leading {
        overflow: hidden;
      }

      .solo-chatbox-fast-pass {
        display: none;
      }
    }

    @media (max-width: 640px) {
      html,
      body {
        min-height: 100%;
      }

      .solo-home-shell {
        display: block;
        height: auto;
        min-height: 100vh;
        border-radius: var(--radius-0);
      }

      .solo-home-shell > .task-list-panel,
      .task-list-panel {
        --task-list-panel-width: 100%;
        --task-list-content-width: calc(100% - var(--spacer-24));
        width: 100%;
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      .solo-home-main {
        display: none;
      }
    }

      /* Inline asset icon normalization: keep uploaded HTML independent from external SVG styling. */
      [data-asset-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: transparent !important;
        -webkit-mask: none !important;
        mask: none !important;
      }

      [data-asset-icon] > svg {
        display: block;
        width: 100%;
        height: 100%;
        flex: 0 0 auto;
      }

      .asset-inline-icon {
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
      }
    

    /* design-library-creator layout guard */
    .uikit-shell { width: 100%; max-width: 1184px; margin: 0 auto; overflow: hidden; display: block; }
    .uikit-sidebar { min-width: 0; overflow: hidden; max-width: 100%; }
    .uikit-main { min-width: 0; }
    .uikit-toolbar { min-width: 0; display: flex; align-items: center; gap: var(--spacer-8); }
    .uikit-responsive-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--spacer-16); }
    .uikit-table-wrap { max-width: 100%; overflow-x: auto; overscroll-behavior-x: contain; }
    .uikit-truncate { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .uikit-nowrap { white-space: nowrap; flex-shrink: 0; }
    .uikit-action-cell { display: flex; align-items: center; gap: 8px; min-width: 0; max-width: 160px; overflow: hidden; }
    .uikit-action { min-width: 0; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    @media (max-width: 900px) { .uikit-shell { grid-template-columns: minmax(0, 1fr); } .uikit-responsive-grid { grid-template-columns: minmax(0, 1fr); } }
    @media (max-width: 640px) { .uikit-toolbar { flex-direction: column; align-items: stretch; } .uikit-responsive-grid { grid-template-columns: minmax(0, 1fr); } }

    <div id="traework-react-root" aria-hidden="true"></div>
    <script type="text/babel">
      function TraeWorkInteractionLayer() {
        const [activeTarget, setActiveTarget] = React.useState(null);

        React.useEffect(() => {
          const rootElement = document.getElementById('traework-react-root');
          if (rootElement) rootElement.dataset.reactMounted = 'true';

          const interactiveSelectors = [
            '[data-nav]',
            '[data-screen-trigger]',
            '[role="tab"]',
            '.tab',
            '.nav-item',
            '.sidebar-nav a',
            '.sidebar a',
            '.mobile-nav a'
          ];

          const getActiveClass = (element) => {
            const classes = Array.from(element.classList || []);
            return classes.find((name) => name.endsWith('--active')) ||
              classes.find((name) => name === 'is-active' || name === 'active' || name === 'selected') ||
              (element.classList && element.classList.contains('tab') ? 'tab--active' : null) ||
              (element.classList && element.classList.contains('nav-item') ? 'nav-item--active' : null);
          };

          const activateWithinGroup = (element, activeClass) => {
            const group = element.closest('[role="tablist"], nav, .sidebar, .sidebar-nav, .mobile-nav') || element.parentElement;
            if (!group || !activeClass) return;

            group.querySelectorAll(interactiveSelectors.join(',')).forEach((item) => {
              item.classList.remove(activeClass);
              if (item.getAttribute('role') === 'tab') item.setAttribute('aria-selected', 'false');
            });

            element.classList.add(activeClass);
            if (element.getAttribute('role') === 'tab') element.setAttribute('aria-selected', 'true');
          };

          const handleClick = (event) => {
            const target = event.currentTarget;
            const href = target.getAttribute('href');
            if (href === '#') event.preventDefault();

            const label = target.getAttribute('aria-label') || target.textContent.trim();
            setActiveTarget(label || target.className || target.tagName);
            activateWithinGroup(target, getActiveClass(target));
          };

          const elements = Array.from(document.querySelectorAll(interactiveSelectors.join(',')))
            .filter((element) => element.id !== 'traework-react-root');

          elements.forEach((element) => element.addEventListener('click', handleClick));
          return () => {
            elements.forEach((element) => element.removeEventListener('click', handleClick));
            if (rootElement) delete rootElement.dataset.reactMounted;
          };
        }, [activeTarget]);

        return null;
      }

      const traeWorkRoot = document.getElementById('traework-react-root');
      if (traeWorkRoot && window.React && window.ReactDOM) {
        ReactDOM.createRoot(traeWorkRoot).render(<TraeWorkInteractionLayer />);
      }
    </script>
