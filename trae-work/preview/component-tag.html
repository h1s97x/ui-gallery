<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tag</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <link rel="stylesheet" href="../scaffold.css" />
  <link rel="stylesheet" href="../components.css" />
  <style>
    /* @component-css-start */
    /* ===== Tag / Badge ===== */
    .ds-tag { display: inline-flex; align-items: center; gap: var(--spacer-4); height: 22px; padding: 0 var(--spacer-8); border-radius: var(--radius-8); font-size: var(--body-sm-font-size); line-height: var(--body-sm-line-height); background: var(--bg-overlay-l2); color: var(--text-secondary); border: 1px solid var(--border-neutral-l1); }
    .ds-tag .icon { width: 12px; height: 12px; }
    .ds-tag--brand { background: var(--bg-brand-popup); color: var(--text-brand); }
    .ds-tag--success { background: var(--status-success-surface-l1); color: var(--status-success-default); }
    .ds-tag--warning { background: var(--status-warning-surface-l1); color: var(--status-warning-default); }
    .ds-tag--danger { background: var(--status-error-surface-l1); color: var(--status-error-default); }
    /* @component-css-end */
  </style>
</head>
<body>
  <div class="pv-header">
    <h1>Tag</h1>
    <p>Status badges in default, success, warning, danger and brand variants.</p>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">Tags</div>
    <div class="row">
      <span class="ds-tag">Default</span>
      <span class="ds-tag ds-tag--success">Active</span>
      <span class="ds-tag ds-tag--warning">Pending</span>
      <span class="ds-tag ds-tag--danger">Failed</span>
      <span class="ds-tag ds-tag--brand"><span style="width:var(--spacer-6);height:var(--spacer-6);border-radius:var(--radius-full);background:currentColor;display:inline-block;margin-right:var(--spacer-6);"></span>Live</span>
    </div>
  </div>

</body>
</html>
