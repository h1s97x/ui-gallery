<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:calc(var(--spacing)*3);background:var(--background);color:var(--foreground);font:500 14px/1.4 var(--font-sans);letter-spacing:var(--tracking-normal)}.row{display:flex;align-items:flex-start;gap:calc(var(--spacing)*2);flex-wrap:wrap;margin-bottom:calc(var(--spacing)*2)}.label{min-width:88px;padding-top:10px;color:var(--muted-foreground);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}.nav{display:flex;align-items:center;gap:calc(var(--spacing)*2);min-height:56px;padding:calc(var(--spacing)*2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm)}.brand{padding:0 calc(var(--spacing)*2);color:var(--primary);font-weight:800;white-space:nowrap}.menu{display:flex;gap:calc(var(--spacing)*1.5);flex-wrap:wrap}.item{padding:10px 14px;border:0;border-radius:calc(var(--radius) - .55rem);background:transparent;color:var(--foreground);font:600 13px/1 var(--font-sans);cursor:pointer;transition:background .18s ease,color .18s ease,box-shadow .18s ease}.item:hover{background:var(--accent);color:var(--accent-foreground)}.item:focus-visible{outline:2px solid var(--ring);outline-offset:2px}.item[aria-current="true"]{background:var(--sidebar-accent);color:var(--primary);box-shadow:inset 0 -2px 0 var(--primary)}.item:disabled{opacity:.45;background:transparent;color:var(--muted-foreground);box-shadow:none;cursor:not-allowed}.topbar{background:var(--sidebar);border-color:var(--sidebar-border)}.seg{padding:calc(var(--spacing)*1.5);background:var(--secondary);border-color:var(--border)}.seg .item{background:transparent}.seg .item[aria-current="true"]{background:var(--primary);color:var(--primary-foreground);box-shadow:var(--shadow-xs)}.divider{margin:calc(var(--spacing)*3) 0;border:0;border-top:1px solid var(--border)}</style>
</head>
<body>
<div class="row"><span class="label">Topbar</span><nav class="nav topbar" aria-label="Primary"><span class="brand">Barbie</span><div class="menu"><button class="item" aria-current="true">Overview</button><button class="item">Campaigns</button><button class="item">Insights</button></div></nav><nav class="nav topbar" aria-label="Primary disabled"><span class="brand">Barbie</span><div class="menu"><button class="item" aria-current="true" disabled>Overview</button><button class="item" disabled>Campaigns</button><button class="item" disabled>Insights</button></div></nav></div>
<hr class="divider">
<div class="row"><span class="label">Segmented</span><div class="nav seg" role="tablist" aria-label="Dashboard views"><button class="item" aria-current="true">Overview</button><button class="item">Campaigns</button><button class="item">Insights</button></div><div class="nav seg" role="tablist" aria-label="Dashboard views disabled"><button class="item" aria-current="true" disabled>Overview</button><button class="item" disabled>Campaigns</button><button class="item" disabled>Insights</button></div></div>
</body>
</html>
