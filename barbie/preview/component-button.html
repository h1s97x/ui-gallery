<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:calc(var(--spacing)*3);background:var(--background);color:var(--foreground);font:500 14px/1.4 var(--font-sans);letter-spacing:var(--tracking-normal)}.row{display:flex;align-items:center;gap:calc(var(--spacing)*2);flex-wrap:wrap;margin-bottom:calc(var(--spacing)*2)}.label{min-width:88px;color:var(--muted-foreground);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:0 calc(var(--spacing)*5);border:1px solid transparent;border-radius:var(--radius);box-shadow:var(--shadow-sm);font:600 13px/1 var(--font-sans);letter-spacing:var(--tracking-normal);transition:background .18s ease,color .18s ease,border-color .18s ease,box-shadow .18s ease,transform .18s ease;cursor:pointer}.btn:hover{transform:translateY(-1px)}.btn:focus-visible{outline:2px solid var(--ring);outline-offset:2px}.btn:active{transform:translateY(0)}.btn:disabled{opacity:.45;box-shadow:none;cursor:not-allowed;transform:none}.btn-primary{background:var(--primary);color:var(--primary-foreground)}.btn-primary:hover{background:var(--accent)}.btn-secondary{background:var(--secondary);color:var(--secondary-foreground);border-color:var(--border)}.btn-secondary:hover{background:var(--accent);color:var(--accent-foreground)}.btn-ghost{min-height:32px;padding:0 calc(var(--spacing)*4);background:transparent;color:var(--primary);border-color:var(--border);box-shadow:none}.btn-ghost:hover,.btn-ghost:focus-visible{background:var(--secondary)}.divider{margin:calc(var(--spacing)*3) 0;border:0;border-top:1px solid var(--border)}</style>
</head>
<body>
<div class="row"><span class="label">Primary md</span><button class="btn btn-primary">Launch Now</button><button class="btn btn-primary" disabled>Launch Now</button></div>
<hr class="divider">
<div class="row"><span class="label">Secondary md</span><button class="btn btn-secondary">Add to Board</button><button class="btn btn-secondary" disabled>Add to Board</button></div>
<div class="row"><span class="label">Ghost sm</span><button class="btn btn-ghost">Campaign Pulse</button><button class="btn btn-ghost" disabled>Campaign Pulse</button></div>
</body>
</html>
