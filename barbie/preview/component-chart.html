<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:12px;background:var(--background);color:var(--foreground);font:500 12px/1.4 var(--font-sans)}.row{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap}.label{width:68px;padding-top:8px;color:var(--muted-foreground);font-size:10px;font-weight:700;letter-spacing:.12em}.divider{margin:10px 0;border:0;border-top:1px solid var(--border)}.card{flex:1 1 168px;min-width:168px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow-sm)}.card:hover{box-shadow:var(--shadow-md)}.muted{opacity:.45;filter:saturate(.75)}.top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}.eyebrow{color:var(--muted-foreground);font-size:10px;text-transform:uppercase;letter-spacing:.1em}.value{font-size:18px;font-weight:700}.bars{display:flex;align-items:flex-end;gap:8px;height:82px}.bar{flex:1;min-width:18px;border-radius:calc(var(--radius) - 6px) calc(var(--radius) - 6px) 8px 8px}.c1{background:var(--chart-1)}.c2{background:var(--chart-2)}.c3{background:var(--chart-3)}.c4{background:var(--chart-4)}.c5{background:var(--chart-5)}.h38{height:38%}.h50{height:50%}.h55{height:55%}.h58{height:58%}.h61{height:61%}.h68{height:68%}.h76{height:76%}.line{height:82px;border-radius:calc(var(--radius) - 6px);background:linear-gradient(180deg,var(--primary),var(--card) 72%)}.line svg{width:100%;height:100%}.line path{fill:none;stroke:var(--chart-2);stroke-width:3;stroke-linecap:round;stroke-linejoin:round}.line circle{fill:var(--accent);stroke:var(--card);stroke-width:2}.donut{width:86px;height:86px;margin:0 auto;border-radius:50%;background:conic-gradient(var(--chart-1) 0 42%,var(--chart-3) 42% 76%,var(--chart-5) 76%);position:relative;box-shadow:inset 0 0 0 1px var(--border)}.donut:after{content:"";position:absolute;inset:18px;border-radius:50%;background:var(--card)}.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;color:var(--muted-foreground);font-size:10px}.swatch{width:10px;height:10px;border-radius:999px;display:inline-block;margin-right:4px;vertical-align:-1px}</style></head><body><div class="row"><span class="label">BARS</span><div class="card"><div class="top"><div><div class="eyebrow">Conversion Lift</div><div class="value">+18%</div></div><div class="eyebrow">Q2</div></div><div class="bars"><span class="bar c5 h38"></span><span class="bar c3 h58"></span><span class="bar c1 h76"></span><span class="bar c2 h68"></span></div></div><div class="card muted" aria-disabled="true"><div class="top"><div><div class="eyebrow">Paused Test</div><div class="value">Standby</div></div><div class="eyebrow">Q3</div></div><div class="bars"><span class="bar c5 h38"></span><span class="bar c4 h50"></span><span class="bar c3 h61"></span><span class="bar c2 h55"></span></div></div></div><hr class="divider"><div class="row"><span class="label">MIXED</span><div class="card"><div class="top"><div><div class="eyebrow">Sparkline</div><div class="value">Weekly Reach</div></div><div class="eyebrow">Live</div></div><div class="line"><svg viewBox="0 0 160 82" aria-hidden="true"><path d="M8 55C25 60 34 34 52 37s23 24 42 20 20-27 38-25 13 7 20 6"/><circle cx="52" cy="37" r="4"/><circle cx="94" cy="57" r="4"/><circle cx="132" cy="32" r="4"/></svg></div></div><div class="card"><div class="top"><div><div class="eyebrow">Audience Mix</div><div class="value">64% Return</div></div><div class="eyebrow">Split</div></div><div class="donut" aria-hidden="true"></div><div class="legend"><span><i class="swatch c1"></i>VIP</span><span><i class="swatch c3"></i>Repeat</span><span><i class="swatch c5"></i>New</span></div></div></div></body></html>
