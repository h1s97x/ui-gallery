<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:calc(var(--spacing)*3);background:var(--background);color:var(--foreground);font-family:var(--font-sans)}.row{display:flex;align-items:center;gap:calc(var(--spacing)*2);flex-wrap:wrap;margin:0 0 calc(var(--spacing)*2)}.label{min-width:72px;font:600 10px/1 var(--font-mono);letter-spacing:var(--tracking-normal);text-transform:uppercase;color:var(--foreground);opacity:.68}.divider{margin:calc(var(--spacing)*2) 0;border:0;border-top:1px solid var(--border)}.avatar{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:calc(var(--radius)*999);background:var(--secondary);color:var(--foreground);box-shadow:var(--shadow-sm);font-weight:700;letter-spacing:var(--tracking-normal);text-transform:uppercase}.sm{width:32px;height:32px;font-size:11px}.md{width:44px;height:44px;font-size:13px}.lg{width:56px;height:56px;font-size:16px}.disabled{background:var(--muted);box-shadow:none;opacity:.46}.highlight{background:var(--primary);color:var(--primary-foreground);box-shadow:0 0 0 2px var(--background),0 0 0 4px var(--ring)}</style>
</head>
<body>
<div class="row"><span class="label">Default</span><div class="avatar sm">MF</div><div class="avatar md">AL</div><div class="avatar lg">KT</div></div>
<div class="row"><span class="label">Disabled</span><div class="avatar sm disabled" aria-disabled="true">MF</div><div class="avatar md disabled" aria-disabled="true">AL</div><div class="avatar lg disabled" aria-disabled="true">KT</div></div>
<hr class="divider">
<div class="row"><span class="label">Highlight</span><div class="avatar sm highlight">MF</div><div class="avatar md highlight">AL</div><div class="avatar lg highlight">KT</div></div>
</body>
</html>
