<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:12px;background:var(--background);color:var(--foreground);font:500 12px/1.4 var(--font-sans),sans-serif;letter-spacing:var(--tracking-normal)}.row{display:flex;align-items:stretch;gap:8px;flex-wrap:wrap}.label{display:flex;align-items:center;min-width:64px;color:var(--muted-foreground);font-size:10px;text-transform:uppercase;letter-spacing:.12em}.divider{margin:8px 0;border:0;border-top:1px solid var(--border)}.card{width:176px;min-height:118px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow);color:var(--card-foreground);display:flex;flex-direction:column;gap:10px}.eyebrow{font-size:10px;color:var(--muted-foreground);text-transform:uppercase;letter-spacing:.12em}.title{font-size:13px}.value{font-size:30px;line-height:1;color:var(--chart-1)}.meta{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:auto;color:var(--muted-foreground);font-size:11px}.pill{padding:4px 8px;border-radius:var(--radius);background:var(--muted);color:var(--muted-foreground)}.delta{color:var(--primary)}.cta{padding:7px 10px;border:1px solid var(--primary);border-radius:var(--radius);background:var(--primary);color:var(--primary-foreground);font:inherit;text-transform:uppercase;letter-spacing:.08em}.cta:hover,.cta:focus{background:var(--chart-1);border-color:var(--chart-1);outline:none}.highlight{background:linear-gradient(135deg,var(--card),var(--accent));border-color:var(--secondary)}.progress{height:6px;border-radius:var(--radius);background:var(--muted);overflow:hidden}.progress>span{display:block;height:100%;width:72%;background:var(--chart-2)}.is-disabled{opacity:.5;filter:saturate(.6)}.is-disabled .cta{background:var(--muted);border-color:var(--border);color:var(--muted-foreground)}</style>
</head>
<body>
<div class="row"><span class="label">Metric</span><article class="card"><span class="eyebrow">MotionFit</span><div class="title">Recovery Score</div><div class="value">84</div><div class="meta"><span class="delta">+6 today</span><span class="pill">Ready</span></div></article><article class="card is-disabled" aria-disabled="true"><span class="eyebrow">MotionFit</span><div class="title">Recovery Score</div><div class="value">61</div><div class="meta"><span>Sync paused</span><span class="pill">Locked</span></div></article></div>
<hr class="divider">
<div class="row"><span class="label">Programs</span><article class="card highlight"><span class="eyebrow">Next session</span><div class="title">HIIT Blast</div><div class="meta"><span>24 min</span><button class="cta">Start now</button></div></article><article class="card"><span class="eyebrow">Community</span><div class="title">May Sprint Challenge</div><div class="progress"><span></span></div><div class="meta"><span>72% complete</span><span class="pill">Rank #8</span></div></article></div>
</body>
</html>
