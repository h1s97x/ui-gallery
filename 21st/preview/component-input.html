<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:12px;background:var(--background);color:var(--foreground);font:14px/1.4 var(--font-sans);letter-spacing:var(--tracking-normal)}.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}.label{width:64px;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-foreground)}.field{display:flex;align-items:center;gap:8px;min-width:208px;height:40px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--input);color:var(--foreground);box-shadow:var(--shadow-xs)}.field input{width:100%;border:0;outline:0;background:transparent;color:inherit;font:inherit;letter-spacing:inherit}.field input::placeholder{color:var(--muted-foreground)}.field:focus-within{border-color:var(--ring);box-shadow:0 0 0 2px color-mix(in srgb,var(--ring) 22%,transparent),var(--shadow-xs)}.field[data-filled=true]{background:var(--card)}.field[aria-disabled=true]{background:var(--muted);color:var(--muted-foreground);border-style:dashed;box-shadow:none}.field[aria-disabled=true] input{cursor:not-allowed}.field.search::before{content:"⌕";color:var(--muted-foreground);font-size:14px}.field.select{justify-content:space-between}.caret{color:var(--muted-foreground);font-size:12px}.lg{height:44px;min-width:224px;padding:0 14px}.divider{margin:10px 0;border:0;border-top:1px solid var(--border)}</style>
</head>
<body>
<div class="row"><span class="label">Search</span><label class="field search"><input type="text" placeholder="Search accounts"></label><label class="field search" data-filled="true"><input type="text" value="Filter by owner"></label><label class="field search" aria-disabled="true"><input type="text" placeholder="Search accounts" disabled></label></div>
<hr class="divider">
<div class="row"><span class="label">Filters</span><label class="field select lg"><input type="text" value="Region" aria-label="Region"><span class="caret">▾</span></label><label class="field select lg" aria-disabled="true"><input type="text" value="Date range" aria-label="Date range" disabled><span class="caret">▾</span></label></div>
</body>
</html>
